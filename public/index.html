<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificación de Contenedores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: #f5f7fa; color: #1a1a2e; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar { background: #0f2040; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.25); position: sticky; top: 0; z-index: 100; }
    .topbar-logo { font-size: 15px; font-weight: 700; margin-right: auto; white-space: nowrap; }
    .topbar-logo span { color: #f9a825; }
    .nav-tab { background: transparent; border: none; color: rgba(255,255,255,.6); padding: 0 16px; height: 56px; cursor: pointer; font-size: 13px; border-bottom: 3px solid transparent; transition: .15s; font-weight: 500; }
    .nav-tab:hover { color: #fff; }
    .nav-tab.active { color: #fff; border-bottom-color: #f9a825; }

    /* ── Layout ── */
    .main { flex: 1; padding: 20px 24px; max-width: 1340px; width: 100%; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 16px; }
    .card-body { padding: 20px; }
    .card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #0f2040; }

    /* ── Formulario ── */
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; letter-spacing: .4px; }
    .label-opt { font-weight: 400; color: #94a3b8; text-transform: none; font-size: 10px; margin-left: 4px; }

    /* ── Inputs ── */
    select, input[type="date"] { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; font-size: 13px; width: 100%; cursor: pointer; }
    input[type="text"], input[type="number"] { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a2e; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #0f2040; box-shadow: 0 0 0 3px rgba(15,32,64,.08); }
    textarea { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a2e; font-family: inherit; resize: vertical; }

    /* ── Botones ── */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: .12s; }
    .btn:hover { background: #f1f5f9; border-color: #94a3b8; }
    .btn.amber { background: #f9a825; color: #1a1a2e; border: none; font-weight: 700; font-size: 13px; }
    .btn.amber:hover { background: #e09720; }
    .btn.sm { padding: 4px 9px; font-size: 11px; }
    .btn.danger { color: #dc2626; border-color: #fca5a5; }
    .btn.danger:hover { background: #fee2e2; }
    .btn.ghost { border: 1px dashed #cbd5e1; color: #64748b; font-size: 11px; }
    .btn.ghost:hover { border-color: #94a3b8; background: #f8fafc; }

    /* ── Chips ── */
    .chip { display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 3px 8px; font-size: 11px; color: #1e40af; font-weight: 500; margin-right: 4px; margin-bottom: 4px; }
    .chip.remove { cursor: pointer; }
    .chip.remove:hover { background: #dbeafe; }

    /* ── Fincas checklist ── */
    .checkbox-list { max-height: 160px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 4px; border-radius: 4px; }
    .checkbox-item:hover { background: #f8fafc; }
    .checkbox-item input { cursor: pointer; width: 14px; height: 14px; flex-shrink: 0; }
    .checkbox-item label { cursor: pointer; flex: 1; margin: 0; font-size: 12px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-ok      { background: #dcfce7; color: #16a34a; }
    .badge-error   { background: #fee2e2; color: #dc2626; }
    .badge-pending { background: #fef3c7; color: #b45309; }
    .badge-blue    { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    /* ── Banner diferencia ── */
    .diff-banner { padding: 9px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
    .diff-banner.ok    { background: #dcfce7; color: #16a34a; }
    .diff-banner.error { background: #fee2e2; color: #dc2626; }

    /* ── Stats ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 12px; text-align: center; }
    .stat-val { font-size: 26px; font-weight: 700; color: #0f2040; line-height: 1.1; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 5px; text-transform: uppercase; letter-spacing: .3px; }
    .stat.error   { border-color: #fca5a5; background: #fff5f5; }
    .stat.error .stat-val { color: #dc2626; }
    .stat.pending { border-color: #fcd34d; background: #fffbeb; }
    .stat.pending .stat-val { color: #b45309; }

    /* ── Cabecera de día ── */
    .day-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 2px solid #e2e8f0; background: #f8fafc; border-radius: 8px 8px 0 0; }
    .day-name { font-size: 14px; font-weight: 700; color: #0f2040; }

    /* ── Tabla ── */
    table { width: 100%; border-collapse: collapse; }
    table thead { background: #f1f5f9; }
    table th { padding: 9px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
    table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; font-size: 12px; vertical-align: middle; }
    .row-ok      { background: #f0fdf4; }
    .row-ok:hover { background: #dcfce7; }
    .row-error   { background: #fff5f5; }
    .row-error:hover { background: #fee2e2; }
    .row-pending { background: #fffbeb; }
    .row-pending:hover { background: #fef3c7; }
    .row-detail  { background: #f8fafc; }
    .row-total   { background: #e2e8f0; font-weight: 700; }
    .row-total td { border-top: 2px solid #cbd5e1; border-bottom: none; font-size: 12px; }

    /* ── Gran total ── */
    .grand-total { background: #0f2040; color: #fff; border-radius: 8px; padding: 20px 24px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; gap: 16px; margin-bottom: 16px; }
    .grand-total .val { font-size: 28px; font-weight: 700; line-height: 1.1; }
    .grand-total .lbl { font-size: 10px; color: rgba(255,255,255,.6); margin-top: 4px; text-transform: uppercase; letter-spacing: .4px; }

    /* ── Acciones ── */
    .actions { display: flex; gap: 4px; flex-wrap: nowrap; }

    /* ── Inline add ── */
    .inline-add { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .inline-add input { flex: 1; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-box { background: #fff; border-radius: 10px; padding: 24px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #e2e8f0; }
    .modal-title { font-size: 15px; font-weight: 700; color: #0f2040; }

    /* ── Zona tabs ── */
    .zona-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; flex-wrap: nowrap; }
    .zona-tab { padding: 7px 16px; border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; color: #64748b; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: .12s; flex-shrink: 0; }
    .zona-tab:hover { background: #f1f5f9; border-color: #94a3b8; }
    .zona-tab.active { background: #0f2040; color: #fff; border-color: #0f2040; }

    /* ── Sub-fila de detalle de exportadora ── */
    .row-sub { background: #f8fafc; }
    .row-sub td { padding: 8px 12px 8px 28px; border-bottom: 1px solid #f1f5f9; font-size: 11px; color: #475569; }
    .row-sub:last-child td { border-bottom: none; }

    /* ── Misc ── */
    .saving-dot { font-size: 11px; color: #f9a825; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .empty-state { text-align: center; color: #94a3b8; padding: 48px 20px; font-size: 14px; }
    .sep { height: 1px; background: #e2e8f0; margin: 8px 0; }
  </style>
</head>
<body>
<div id="app"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── Constantes de fecha ──────────────────────────────────────────────────────
const DIAS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES  = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DIA_ORDEN = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

function parseFecha(str) {
  // Evita problemas de zona horaria parseando manualmente
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fechaAISOWeek(dateStr) {
  const d = parseFecha(dateStr);
  const dow = d.getDay() || 7; // 1=Lun, 7=Dom
  d.setDate(d.getDate() + 4 - dow); // Jueves de la semana ISO
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const wk = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return `${d.getFullYear()}-W${String(wk).padStart(2, '0')}`;
}

function getDia(dateStr) {
  return DIAS[parseFecha(dateStr).getDay()];
}

function formatFechaCorta(dateStr) {
  const d = parseFecha(dateStr);
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]}`;
}

function getWeekLabel(isoWeek) {
  const [yr, wkStr] = isoWeek.split('-W');
  const year = +yr, wk = +wkStr;
  const jan4 = new Date(year, 0, 4);
  const dow = jan4.getDay() || 7;
  const lunes = new Date(jan4);
  lunes.setDate(jan4.getDate() - dow + 1 + (wk - 1) * 7);
  const domingo = new Date(lunes);
  domingo.setDate(lunes.getDate() + 6);
  const l = `${lunes.getDate()} ${MESES[lunes.getMonth()]}`;
  const d = `${domingo.getDate()} ${MESES[domingo.getMonth()]} ${domingo.getFullYear()}`;
  return `Sem. ${wk} · ${l} al ${d}`;
}

// ─── Compatibilidad hacia atrás ───────────────────────────────────────────────
const getPlan = p => p.planificado != null ? p.planificado : (p.cantidad ?? 0);
const getInsp = p => {
  if ('inspeccionado' in p) return p.inspeccionado; // null = pendiente, número = completo
  if (p.completado === true)  return p.cantidad ?? 0;
  if (p.completado === false) return null;
  return null;
};
const getDiff    = p => getInsp(p) == null ? null : +(getPlan(p) - getInsp(p)).toFixed(2);
const isPending  = p => getInsp(p) == null;
const hasError   = p => !isPending(p) && getDiff(p) !== 0;
const isOK       = p => !isPending(p) && getDiff(p) === 0;

// ─── API ─────────────────────────────────────────────────────────────────────
const saveContenedores = planes =>
  fetch('/api/contenedores', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contenedores: planes }) });

const saveConfig = cfg =>
  fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fincas: cfg.fincas, tecnicos: cfg.tecnicos }) });

// ─── Formulario (compartido entre Agregar y Modal de edición) ─────────────────
function FormularioPlan({ config, setConfig, inicial, esEdicion, fechaInicial, onGuardar, onCancelar }) {
  const [fecha,         setFecha]         = useState(inicial?.fecha ?? fechaInicial ?? '');
  const [zona,          setZona]          = useState(inicial?.zona ?? '');
  const [exportadora,   setExportadora]   = useState(inicial?.exportadora ?? '');
  const [planificado,   setPlanificado]   = useState(inicial != null ? String(getPlan(inicial)) : '');
  const [inspeccionado, setInspeccionado] = useState(
    inicial != null && getInsp(inicial) != null ? String(getInsp(inicial)) : ''
  );
  const [fincas,        setFincas]        = useState(inicial?.fincas ?? []);
  const [tecnicos,      setTecnicos]      = useState(inicial?.tecnicos ?? []);
  const [motivo,        setMotivo]        = useState(inicial?.motivo ?? '');
  const [buscarFinca,   setBuscarFinca]   = useState('');

  // Agregar nuevo técnico inline
  const [mostrarNuevoTec, setMostrarNuevoTec] = useState(false);
  const [nuevoTecNombre,  setNuevoTecNombre]  = useState('');

  // Agregar nueva finca inline
  const [mostrarNuevaFinca, setMostrarNuevaFinca] = useState(false);
  const [nuevaFincaNombre,  setNuevaFincaNombre]  = useState('');

  // Derivados de fecha
  const semanaCalc = fecha ? fechaAISOWeek(fecha) : '';
  const diaCalc    = fecha ? getDia(fecha) : '';

  // Derivados de cantidades
  const planNum = parseFloat(planificado) || 0;
  const inspNum = parseFloat(inspeccionado) || 0;
  const ambos   = planificado !== '' && inspeccionado !== '';
  const hayDiff = ambos && planNum !== inspNum;
  const diffNum = +(planNum - inspNum).toFixed(2);

  // Listas derivadas de config
  const exportadoras    = zona ? Object.keys(config.fincas[zona] || {}) : [];
  const fincasDeExp     = zona && exportadora ? (config.fincas[zona]?.[exportadora] || []) : [];
  const fincasFiltradas = fincasDeExp.filter(f => f.toLowerCase().includes(buscarFinca.toLowerCase()));

  const toggleFinca = f =>
    setFincas(prev => prev.includes(f) ? prev.filter(x => x !== f) : [...prev, f]);

  const toggleTecnico = t => {
    if (tecnicos.includes(t)) { setTecnicos(prev => prev.filter(x => x !== t)); return; }
    if (tecnicos.length >= 2) { alert('Máximo 2 técnicos por registro.'); return; }
    setTecnicos(prev => [...prev, t]);
  };

  const handleZona = v => { setZona(v); setExportadora(''); setFincas([]); setBuscarFinca(''); setMostrarNuevaFinca(false); };
  const handleExp  = v => { setExportadora(v); setFincas([]); setBuscarFinca(''); setMostrarNuevaFinca(false); };

  const confirmarNuevoTecnico = async () => {
    const nombre = nuevoTecNombre.trim().toUpperCase();
    if (!nombre) return;
    if (config.tecnicos.includes(nombre)) { alert('Ese técnico ya existe en la lista.'); return; }
    const nuevoConfig = { ...config, tecnicos: [...config.tecnicos, nombre] };
    setConfig(nuevoConfig);
    setNuevoTecNombre('');
    setMostrarNuevoTec(false);
    setTecnicos(prev => prev.length < 2 ? [...prev, nombre] : prev);
    await saveConfig(nuevoConfig).catch(console.error);
  };

  const confirmarNuevaFinca = async () => {
    const nombre = nuevaFincaNombre.trim();
    if (!nombre || !zona || !exportadora) return;
    const existentes = config.fincas[zona]?.[exportadora] || [];
    if (existentes.includes(nombre)) { alert('Esa finca ya existe en esta exportadora.'); return; }
    const nuevoConfig = {
      ...config,
      fincas: {
        ...config.fincas,
        [zona]: { ...config.fincas[zona], [exportadora]: [...existentes, nombre] }
      }
    };
    setConfig(nuevoConfig);
    setNuevaFincaNombre('');
    setMostrarNuevaFinca(false);
    setFincas(prev => [...prev, nombre]);
    await saveConfig(nuevoConfig).catch(console.error);
  };

  const submit = () => {
    if (!fecha || !zona || !exportadora || planificado === '' || fincas.length === 0 || tecnicos.length === 0) {
      alert('Completa los campos obligatorios: fecha, zona, exportadora, planificado, fincas y técnicos.');
      return;
    }
    const inspValor = inspeccionado === '' ? null : inspNum;
    if (inspValor != null && hayDiff && !motivo.trim()) {
      alert('Hay diferencia entre planificado e inspeccionado. Escribe el motivo.');
      return;
    }
    onGuardar({
      id:           inicial?.id ?? Math.random().toString(36).slice(2),
      fecha,
      semana:       semanaCalc,
      dia:          diaCalc,
      zona,
      exportadora,
      planificado:  planNum,
      inspeccionado: inspValor,
      fincas,
      tecnicos,
      motivo:       (inspValor != null && hayDiff) ? motivo.trim() : '',
      timestamp:    inicial?.timestamp ?? new Date().toISOString()
    });
  };

  return (
    <div>
      {/* Fecha */}
      <div className="form-group">
        <label>Fecha del proceso</label>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
          <input type="date" value={fecha} onChange={e => setFecha(e.target.value)} style={{ maxWidth: 200 }} />
          {diaCalc && (
            <span className="badge badge-blue" style={{ fontSize: 12, padding: '4px 12px' }}>
              {diaCalc} · {getWeekLabel(semanaCalc)}
            </span>
          )}
        </div>
      </div>

      {/* Zona + Exportadora */}
      <div className="form-row">
        <div className="form-group">
          <label>Zona</label>
          <select value={zona} onChange={e => handleZona(e.target.value)}>
            <option value="">-- Selecciona zona --</option>
            {config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
          </select>
        </div>
        {zona && (
          <div className="form-group">
            <label>Exportadora</label>
            <select value={exportadora} onChange={e => handleExp(e.target.value)}>
              <option value="">-- Selecciona --</option>
              {exportadoras.map(e => <option key={e} value={e}>{e}</option>)}
            </select>
          </div>
        )}
      </div>

      {/* Planificado + Inspeccionado */}
      <div className="form-row">
        <div className="form-group">
          <label>Planificado</label>
          <input type="number" step="0.5" min="0" placeholder="0"
            value={planificado} onChange={e => setPlanificado(e.target.value)} />
        </div>
        <div className="form-group">
          <label>Inspeccionado <span className="label-opt">(dejar vacío si aún no se inspecciona)</span></label>
          <input type="number" step="0.5" min="0" placeholder="— pendiente"
            value={inspeccionado} onChange={e => setInspeccionado(e.target.value)} />
        </div>
      </div>

      {/* Banner diferencia */}
      {ambos && (
        <div className={`diff-banner ${hayDiff ? 'error' : 'ok'}`}>
          {hayDiff
            ? `⚠ Diferencia de ${Math.abs(diffNum)} contenedor${Math.abs(diffNum) === 1 ? '' : 'es'} — se requiere motivo`
            : '✓ Planificado e inspeccionado coinciden'}
        </div>
      )}

      {/* Fincas */}
      {exportadora && (
        <div className="form-group">
          <label>Fincas <span className="label-opt">({fincas.length} seleccionadas)</span></label>
          <input type="text" placeholder="Buscar finca..." value={buscarFinca}
            onChange={e => setBuscarFinca(e.target.value)} style={{ marginBottom: 6 }} />
          <div className="checkbox-list">
            {fincasFiltradas.length === 0
              ? <div style={{ color: '#94a3b8', padding: '6px 4px', fontSize: 12 }}>Sin resultados</div>
              : fincasFiltradas.map(f => (
                <div key={f} className="checkbox-item">
                  <input type="checkbox" id={`finca-${esEdicion ? 'e' : 'n'}-${f}`}
                    checked={fincas.includes(f)} onChange={() => toggleFinca(f)} />
                  <label htmlFor={`finca-${esEdicion ? 'e' : 'n'}-${f}`}>{f}</label>
                </div>
              ))
            }
          </div>
          {fincas.length > 0 && (
            <div style={{ marginTop: 8 }}>
              {fincas.map(f => <span key={f} className="chip">{f}</span>)}
            </div>
          )}

          {/* Nueva finca inline */}
          {!mostrarNuevaFinca
            ? <button className="btn ghost" style={{ marginTop: 8 }} onClick={() => setMostrarNuevaFinca(true)}>
                + Nueva finca en {exportadora}
              </button>
            : (
              <div className="inline-add">
                <input type="text" placeholder="Nombre de la nueva finca"
                  value={nuevaFincaNombre} onChange={e => setNuevaFincaNombre(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && confirmarNuevaFinca()} />
                <button className="btn sm amber" onClick={confirmarNuevaFinca}>Agregar</button>
                <button className="btn sm" onClick={() => { setMostrarNuevaFinca(false); setNuevaFincaNombre(''); }}>✕</button>
              </div>
            )
          }
        </div>
      )}

      {/* Técnicos */}
      <div className="form-group">
        <label>Técnicos <span className="label-opt">({tecnicos.length}/2)</span></label>
        <select onChange={e => { if (e.target.value) toggleTecnico(e.target.value); e.target.value = ''; }}>
          <option value="">Seleccionar técnico...</option>
          {config.tecnicos.filter(t => !tecnicos.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        {tecnicos.length > 0 && (
          <div style={{ marginTop: 8 }}>
            {tecnicos.map(t => (
              <span key={t} className="chip remove" onClick={() => setTecnicos(prev => prev.filter(x => x !== t))}>
                {t} ✕
              </span>
            ))}
          </div>
        )}

        {/* Nuevo técnico inline */}
        {!mostrarNuevoTec
          ? <button className="btn ghost" style={{ marginTop: 8 }} onClick={() => setMostrarNuevoTec(true)}>
              + Nuevo técnico
            </button>
          : (
            <div className="inline-add">
              <input type="text" placeholder="NOMBRE COMPLETO EN MAYÚSCULAS"
                value={nuevoTecNombre} onChange={e => setNuevoTecNombre(e.target.value.toUpperCase())}
                onKeyDown={e => e.key === 'Enter' && confirmarNuevoTecnico()} />
              <button className="btn sm amber" onClick={confirmarNuevoTecnico}>Agregar</button>
              <button className="btn sm" onClick={() => { setMostrarNuevoTec(false); setNuevoTecNombre(''); }}>✕</button>
            </div>
          )
        }
      </div>

      {/* Motivo — solo si hay diferencia con inspeccionado */}
      {hayDiff && inspeccionado !== '' && (
        <div className="form-group">
          <label style={{ color: '#dc2626' }}>Motivo de la diferencia *</label>
          <textarea rows={3}
            placeholder="Explica por qué no se inspeccionó la cantidad planificada..."
            value={motivo} onChange={e => setMotivo(e.target.value)} />
        </div>
      )}

      {/* Acciones */}
      <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
        <button className="btn amber" onClick={submit}
          style={{ flex: 1, padding: '10px', justifyContent: 'center' }}>
          {esEdicion ? '✓ GUARDAR CAMBIOS' : '✓ AGREGAR'}
        </button>
        {onCancelar && (
          <button className="btn" onClick={onCancelar} style={{ padding: '10px 20px' }}>Cancelar</button>
        )}
      </div>
    </div>
  );
}

// ─── Modal de edición ─────────────────────────────────────────────────────────
function ModalEditar({ plan, config, setConfig, onGuardar, onCerrar }) {
  return (
    <div className="modal-overlay" onClick={onCerrar}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">✏️ Editar registro</div>
          <button className="btn sm" onClick={onCerrar}>✕ Cerrar</button>
        </div>
        <FormularioPlan
          config={config} setConfig={setConfig}
          inicial={plan} esEdicion={true}
          onGuardar={reg => { onGuardar(reg); onCerrar(); }}
          onCancelar={onCerrar}
        />
      </div>
    </div>
  );
}

// ─── App principal ────────────────────────────────────────────────────────────
function App() {
  const [tab,          setTab]          = useState('agregar');
  const [config,       setConfig]       = useState(null);
  const [planes,       setPlanes]       = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [saving,       setSaving]       = useState(false);
  const [editando,     setEditando]     = useState(null);
  const [filterSemana, setFilterSemana] = useState('');
  const [filterZona,   setFilterZona]   = useState(''); // '' = Total (todas las zonas)
  const [expanded,     setExpanded]     = useState({});
  const [ultimaFecha,  setUltimaFecha]  = useState(''); // recuerda la última fecha usada

  useEffect(() => {
    Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/contenedores').then(r => r.json())
    ]).then(([cfg, cont]) => {
      setConfig(cfg);
      setPlanes(cont.contenedores || []);
      setLoading(false);
    }).catch(e => { console.error(e); setLoading(false); });
  }, []);

  const persistir = async (nuevos) => {
    setSaving(true);
    try { await saveContenedores(nuevos); } catch (e) { console.error(e); }
    setSaving(false);
  };

  const agregar = reg => {
    setUltimaFecha(reg.fecha);
    const nuevos = [...planes, reg];
    setPlanes(nuevos);
    persistir(nuevos);
  };

  const actualizar = reg => {
    const nuevos = planes.map(p => p.id === reg.id ? reg : p);
    setPlanes(nuevos);
    persistir(nuevos);
  };

  const eliminar = id => {
    if (!confirm('¿Eliminar este registro?')) return;
    const nuevos = planes.filter(p => p.id !== id);
    setPlanes(nuevos);
    persistir(nuevos);
  };

  const toggleExpand = id => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  // ── Resumen ──────────────────────────────────────────────────────────────
  const semanas  = [...new Set(planes.map(p => p.semana).filter(Boolean))].sort((a, b) => b.localeCompare(a));
  const filtrado = planes
    .filter(p => !filterSemana || p.semana === filterSemana)
    .filter(p => !filterZona   || p.zona   === filterZona);

  const totalPlan  = filtrado.reduce((s, p) => s + getPlan(p), 0);
  const totalInsp  = filtrado.filter(p => !isPending(p)).reduce((s, p) => s + getInsp(p), 0);
  const pendientes = filtrado.filter(isPending).length;
  const conError   = filtrado.filter(hasError).length;

  // Agrupar por día, ordenar Lunes→Domingo
  const porDia = {};
  filtrado.forEach(p => {
    const dia = p.dia || (p.fecha ? getDia(p.fecha) : 'Sin fecha');
    if (!porDia[dia]) porDia[dia] = [];
    porDia[dia].push(p);
  });
  const diasOrdenados = [
    ...DIA_ORDEN.filter(d => porDia[d]),
    ...(porDia['Sin fecha'] ? ['Sin fecha'] : [])
  ];

  if (loading) return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: '#64748b', fontSize: 15 }}>
      Cargando datos...
    </div>
  );

  return (
    <div id="app">
      {/* ── Topbar ── */}
      <div className="topbar">
        <div className="topbar-logo">📦 Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'agregar' ? 'active' : ''}`} onClick={() => setTab('agregar')}>➕ Agregar</button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>📊 Resumen</button>
        {saving && <span className="saving-dot">● Guardando...</span>}
      </div>

      <div className="main">

        {/* ════════════════ TAB AGREGAR ════════════════ */}
        {tab === 'agregar' && (
          <div className="card">
            <div className="card-body">
              <div className="card-title">➕ Nueva planificación</div>
              <FormularioPlan
                config={config} setConfig={setConfig}
                inicial={null} esEdicion={false}
                fechaInicial={ultimaFecha}
                onGuardar={agregar}
              />
            </div>
          </div>
        )}

        {/* ════════════════ TAB RESUMEN ════════════════ */}
        {tab === 'resumen' && (
          <div>
            {/* ── Selector de zona ── */}
            <div className="zona-tabs">
              <button className={`zona-tab ${filterZona === '' ? 'active' : ''}`}
                onClick={() => setFilterZona('')}>
                📊 Total
              </button>
              {config.zonas.map(z => (
                <button key={z} className={`zona-tab ${filterZona === z ? 'active' : ''}`}
                  onClick={() => setFilterZona(z)}>
                  {z.split(' - ')[0]}
                </button>
              ))}
            </div>

            {/* Título de zona activa */}
            {filterZona && (
              <div style={{ fontSize: 13, fontWeight: 700, color: '#0f2040', marginBottom: 12 }}>
                {filterZona}
              </div>
            )}

            {/* Stats */}
            <div className="stat-grid">
              <div className="stat">
                <div className="stat-val">{filtrado.length}</div>
                <div className="stat-label">Registros</div>
              </div>
              <div className="stat">
                <div className="stat-val">{totalPlan.toFixed(1)}</div>
                <div className="stat-label">Total Planificado</div>
              </div>
              <div className="stat">
                <div className="stat-val">{totalInsp.toFixed(1)}</div>
                <div className="stat-label">Total Inspeccionado</div>
              </div>
              <div className={`stat ${pendientes > 0 ? 'pending' : ''}`}>
                <div className="stat-val">{pendientes}</div>
                <div className="stat-label">Pendientes</div>
              </div>
              <div className={`stat ${conError > 0 ? 'error' : ''}`}>
                <div className="stat-val">{conError}</div>
                <div className="stat-label">Con errores</div>
              </div>
            </div>

            {/* Filtro semana */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: '#64748b' }}>Semana:</span>
              <select value={filterSemana} onChange={e => setFilterSemana(e.target.value)} style={{ maxWidth: 360 }}>
                <option value="">Todas las semanas</option>
                {semanas.map(s => <option key={s} value={s}>{getWeekLabel(s)}</option>)}
              </select>
            </div>

            {filtrado.length === 0 && (
              <div className="card">
                <div className="empty-state">Sin registros para mostrar</div>
              </div>
            )}

            {/* ── Tablas por día ── */}
            {diasOrdenados.map(dia => {
              const regs  = porDia[dia];
              const dPlan = regs.reduce((s, p) => s + getPlan(p), 0);
              const dInsp = regs.filter(p => !isPending(p)).reduce((s, p) => s + getInsp(p), 0);
              const dDiff = +(dPlan - dInsp).toFixed(2);
              const dErr  = regs.filter(hasError).length;
              const dPend = regs.filter(isPending).length;

              // ── Vista ZONA: agrupar por exportadora ──────────────────────
              if (filterZona) {
                const expMap = {};
                regs.forEach(p => {
                  if (!expMap[p.exportadora]) expMap[p.exportadora] = { planif: 0, inspec: 0, pend: 0, records: [] };
                  expMap[p.exportadora].planif += getPlan(p);
                  if (isPending(p)) expMap[p.exportadora].pend++;
                  else expMap[p.exportadora].inspec += getInsp(p);
                  expMap[p.exportadora].records.push(p);
                });
                const exportadoras = Object.keys(expMap).sort();

                return (
                  <div key={dia} className="card" style={{ marginBottom: 16, padding: 0, overflow: 'hidden' }}>
                    <div className="day-header">
                      <div className="day-name">{dia}</div>
                      <div style={{ display: 'flex', gap: 8 }}>
                        {dPend > 0  && <span className="badge badge-pending">⏳ {dPend} pendiente{dPend > 1 ? 's' : ''}</span>}
                        {dErr > 0   && <span className="badge badge-error">⚠ {dErr} error{dErr > 1 ? 'es' : ''}</span>}
                        {dErr === 0 && dPend === 0 && <span className="badge badge-ok">✓ Todo OK</span>}
                      </div>
                    </div>
                    <table>
                      <thead>
                        <tr>
                          <th>Exportadora</th>
                          <th style={{ textAlign: 'right' }}>Planif.</th>
                          <th style={{ textAlign: 'right' }}>Inspec.</th>
                          <th style={{ textAlign: 'right' }}>Dif.</th>
                          <th>Estado</th>
                          <th style={{ width: 50 }}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {exportadoras.map(exp => {
                          const g      = expMap[exp];
                          const dif    = +(g.planif - g.inspec).toFixed(2);
                          const allPend= g.pend === g.records.length;
                          const somePend = g.pend > 0;
                          const rowErr = !allPend && dif !== 0;
                          const rowCls = allPend ? 'row-pending' : (rowErr ? 'row-error' : 'row-ok');
                          const key    = `${dia}||${exp}`;
                          return (
                            <React.Fragment key={exp}>
                              {/* Fila de exportadora (sumada) */}
                              <tr className={rowCls}>
                                <td style={{ fontWeight: 700 }}>{exp}</td>
                                <td style={{ textAlign: 'right', fontWeight: 600 }}>{g.planif.toFixed(1)}</td>
                                <td style={{ textAlign: 'right', fontWeight: 600, color: allPend ? '#94a3b8' : 'inherit' }}>
                                  {allPend ? '—' : g.inspec.toFixed(1)}
                                </td>
                                <td style={{ textAlign: 'right', fontWeight: 700,
                                  color: allPend ? '#94a3b8' : rowErr ? '#dc2626' : '#16a34a' }}>
                                  {allPend ? '—' : (dif !== 0 ? `-${Math.abs(dif).toFixed(1)}` : '✓')}
                                </td>
                                <td>
                                  {allPend   && <span className="badge badge-pending">⏳ Pendiente</span>}
                                  {!allPend && somePend && <span className="badge badge-pending">⏳ {g.pend} pend.</span>}
                                  {!somePend && rowErr  && <span className="badge badge-error">⚠ Error</span>}
                                  {!somePend && !rowErr && <span className="badge badge-ok">✓ OK</span>}
                                </td>
                                <td>
                                  <button className="btn sm" onClick={() => toggleExpand(key)}
                                    title="Ver registros individuales">
                                    {expanded[key] ? '▼' : '▶'}
                                  </button>
                                </td>
                              </tr>

                              {/* Sub-filas individuales (expandibles) */}
                              {expanded[key] && g.records.map(p => {
                                const pd  = isPending(p);
                                const pe  = hasError(p);
                                const pdiff = getDiff(p);
                                return (
                                  <tr key={p.id} className="row-sub">
                                    <td style={{ paddingLeft: 24 }}>
                                      <div>{p.fincas.join(', ')}</div>
                                      <div style={{ color: '#94a3b8', marginTop: 2 }}>{p.tecnicos.join(' / ')}</div>
                                      {pe && p.motivo && (
                                        <div style={{ color: '#dc2626', marginTop: 2 }}>Motivo: {p.motivo}</div>
                                      )}
                                    </td>
                                    <td style={{ textAlign: 'right' }}>{getPlan(p).toFixed(1)}</td>
                                    <td style={{ textAlign: 'right', color: pd ? '#94a3b8' : 'inherit' }}>
                                      {pd ? '—' : getInsp(p).toFixed(1)}
                                    </td>
                                    <td style={{ textAlign: 'right', fontWeight: 600,
                                      color: pd ? '#94a3b8' : pe ? '#dc2626' : '#16a34a' }}>
                                      {pd ? '—' : (pdiff !== 0 ? `-${Math.abs(pdiff).toFixed(1)}` : '✓')}
                                    </td>
                                    <td>
                                      {pd && <span className="badge badge-pending">⏳</span>}
                                      {pe && <span className="badge badge-error">⚠</span>}
                                      {isOK(p) && <span className="badge badge-ok">✓</span>}
                                    </td>
                                    <td>
                                      <div className="actions">
                                        <button className="btn sm" onClick={() => setEditando(p)} title="Editar">✏️</button>
                                        <button className="btn sm danger" onClick={() => eliminar(p.id)} title="Eliminar">✕</button>
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })}
                            </React.Fragment>
                          );
                        })}

                        {/* Total del día */}
                        <tr className="row-total">
                          <td>TOTAL {dia.toUpperCase()}</td>
                          <td style={{ textAlign: 'right' }}>{dPlan.toFixed(1)}</td>
                          <td style={{ textAlign: 'right' }}>{dInsp > 0 ? dInsp.toFixed(1) : '—'}</td>
                          <td style={{ textAlign: 'right', color: dDiff !== 0 && dInsp > 0 ? '#dc2626' : '#16a34a' }}>
                            {dInsp > 0 ? (dDiff !== 0 ? `-${Math.abs(dDiff).toFixed(1)}` : '✓') : '—'}
                          </td>
                          <td colSpan={2}></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                );

              // ── Vista TOTAL: agrupar por zona ────────────────────────────
              } else {
                const zonaMap = {};
                regs.forEach(p => {
                  if (!zonaMap[p.zona]) zonaMap[p.zona] = { planif: 0, inspec: 0, pend: 0 };
                  zonaMap[p.zona].planif += getPlan(p);
                  if (isPending(p)) zonaMap[p.zona].pend++;
                  else zonaMap[p.zona].inspec += getInsp(p);
                });
                const zonas = config.zonas.filter(z => zonaMap[z]);

                return (
                  <div key={dia} className="card" style={{ marginBottom: 16, padding: 0, overflow: 'hidden' }}>
                    <div className="day-header">
                      <div className="day-name">{dia}</div>
                      <div style={{ display: 'flex', gap: 8 }}>
                        {dPend > 0  && <span className="badge badge-pending">⏳ {dPend} pendiente{dPend > 1 ? 's' : ''}</span>}
                        {dErr > 0   && <span className="badge badge-error">⚠ {dErr} error{dErr > 1 ? 'es' : ''}</span>}
                        {dErr === 0 && dPend === 0 && <span className="badge badge-ok">✓ Todo OK</span>}
                      </div>
                    </div>
                    <table>
                      <thead>
                        <tr>
                          <th>Zona</th>
                          <th style={{ textAlign: 'right' }}>Planif.</th>
                          <th style={{ textAlign: 'right' }}>Inspec.</th>
                          <th style={{ textAlign: 'right' }}>Dif.</th>
                          <th>Estado</th>
                        </tr>
                      </thead>
                      <tbody>
                        {zonas.map(zona => {
                          const g       = zonaMap[zona];
                          const dif     = +(g.planif - g.inspec).toFixed(2);
                          const allPend = g.pend > 0 && g.inspec === 0;
                          const rowErr  = !allPend && dif !== 0;
                          const rowCls  = allPend ? 'row-pending' : (rowErr ? 'row-error' : 'row-ok');
                          return (
                            <tr key={zona} className={rowCls}
                              style={{ cursor: 'pointer' }}
                              onClick={() => setFilterZona(zona)}
                              title="Clic para ver el detalle de esta zona">
                              <td style={{ fontWeight: 700, color: '#1d4ed8' }}>
                                {zona} <span style={{ fontSize: 10, opacity: .7 }}>↗</span>
                              </td>
                              <td style={{ textAlign: 'right', fontWeight: 600 }}>{g.planif.toFixed(1)}</td>
                              <td style={{ textAlign: 'right', fontWeight: 600, color: allPend ? '#94a3b8' : 'inherit' }}>
                                {allPend ? '—' : g.inspec.toFixed(1)}
                              </td>
                              <td style={{ textAlign: 'right', fontWeight: 700,
                                color: allPend ? '#94a3b8' : rowErr ? '#dc2626' : '#16a34a' }}>
                                {allPend ? '—' : (dif !== 0 ? `-${Math.abs(dif).toFixed(1)}` : '✓')}
                              </td>
                              <td>
                                {g.pend > 0  && <span className="badge badge-pending">⏳ {g.pend} pend.</span>}
                                {g.pend === 0 && rowErr  && <span className="badge badge-error">⚠ Error</span>}
                                {g.pend === 0 && !rowErr && <span className="badge badge-ok">✓ OK</span>}
                              </td>
                            </tr>
                          );
                        })}

                        {/* Total del día */}
                        <tr className="row-total">
                          <td>TOTAL {dia.toUpperCase()}</td>
                          <td style={{ textAlign: 'right' }}>{dPlan.toFixed(1)}</td>
                          <td style={{ textAlign: 'right' }}>{dInsp > 0 ? dInsp.toFixed(1) : '—'}</td>
                          <td style={{ textAlign: 'right', color: dDiff !== 0 && dInsp > 0 ? '#dc2626' : '#16a34a' }}>
                            {dInsp > 0 ? (dDiff !== 0 ? `-${Math.abs(dDiff).toFixed(1)}` : '✓') : '—'}
                          </td>
                          <td></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                );
              }
            })}

            {/* Gran total */}
            {filtrado.length > 0 && (
              <div className="grand-total">
                <div>
                  <div className="val">{totalPlan.toFixed(1)}</div>
                  <div className="lbl">Total Planificado</div>
                </div>
                <div>
                  <div className="val">{totalInsp.toFixed(1)}</div>
                  <div className="lbl">Total Inspeccionado</div>
                </div>
                <div>
                  <div className="val" style={{ color: (totalPlan - totalInsp) !== 0 ? '#f87171' : '#4ade80' }}>
                    {(totalPlan - totalInsp) !== 0 ? `-${Math.abs(totalPlan - totalInsp).toFixed(1)}` : '✓'}
                  </div>
                  <div className="lbl">Diferencia Total</div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Modal de edición */}
      {editando && (
        <ModalEditar
          plan={editando}
          config={config}
          setConfig={setConfig}
          onGuardar={actualizar}
          onCerrar={() => setEditando(null)}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
