<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificación Banano</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; font-size: 14px; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    
    .topbar { background: #0f2040; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; }
    .topbar-logo { font-size: 16px; font-weight: 700; margin-right: auto; }
    .topbar-logo span { color: #f9a825; }
    .nav-tab { background: transparent; border: none; color: rgba(255,255,255,.6); padding: 0 16px; height: 56px; cursor: pointer; font-size: 13px; border-bottom: 3px solid transparent; font-weight: 500; }
    .nav-tab:hover { color: #fff; }
    .nav-tab.active { color: #fff; border-bottom-color: #f9a825; }
    
    .main { flex: 1; padding: 20px; max-width: 1200px; width: 100%; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #0f2040; }
    
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #0f2040; }
    
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn:hover { background: #f1f5f9; }
    .btn.primary { background: #f9a825; color: #1a1a2e; border: none; font-weight: 700; }
    .btn.primary:hover { background: #e09720; }
    .btn.sm { padding: 4px 9px; font-size: 11px; }
    .btn.danger { color: #dc2626; border-color: #fca5a5; }
    .btn.danger:hover { background: #fee2e2; }
    
    .chip { display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 3px 8px; font-size: 11px; color: #1e40af; margin-right: 4px; margin-bottom: 4px; }
    .chip.remove { cursor: pointer; }
    .chip.remove:hover { background: #dbeafe; }
    
    .checkbox-list { max-height: 200px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 4px; }
    .checkbox-item:hover { background: #f8fafc; }
    .checkbox-item input { cursor: pointer; }
    .checkbox-item label { cursor: pointer; flex: 1; margin: 0; font-size: 12px; }
    
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; text-align: center; }
    .stat-val { font-size: 24px; font-weight: 700; color: #0f2040; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 4px; text-transform: uppercase; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
    th { background: #f8fafc; font-weight: 700; color: #475569; text-transform: uppercase; font-size: 11px; }
    tr:hover td { background: #fafbfc; }
    
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-ok { background: #dcfce7; color: #16a34a; }
    .badge-pending { background: #fef3c7; color: #b45309; }
    .badge-error { background: #fee2e2; color: #dc2626; }
    
    .empty { text-align: center; color: #94a3b8; padding: 48px 20px; }
  </style>
</head>
<body>
<div id="app"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState('agregar');
  const [config, setConfig] = useState(null);
  const [contenedores, setContenedores] = useState([]);
  const [loading, setLoading] = useState(true);
  
  // Form state
  const [fecha, setFecha] = useState('');
  const [numero, setNumero] = useState('');
  const [zona, setZona] = useState('');
  const [exportadora, setExportadora] = useState('');
  const [fincas, setFincas] = useState([]);
  const [tecnicos, setTecnicos] = useState([]);
  const [completado, setCompletado] = useState(true);
  const [motivo, setMotivo] = useState('');

  useEffect(() => {
    Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/contenedores').then(r => r.json())
    ]).then(([cfg, cont]) => {
      setConfig(cfg);
      setContenedores(cont.contenedores || []);
      setLoading(false);
    }).catch(e => {
      console.error(e);
      setLoading(false);
    });
  }, []);

  const saveContenedores = async (arr) => {
    try {
      await fetch('/api/contenedores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contenedores: arr })
      });
    } catch (e) {
      console.error(e);
    }
  };

  const agregarContenedor = () => {
    if (!fecha || !numero || !zona || !exportadora || fincas.length === 0 || tecnicos.length === 0) {
      alert('Completa todos los campos obligatorios');
      return;
    }
    
    const nuevo = {
      id: Date.now() + '-' + Math.random(),
      fecha,
      numero,
      zona,
      exportadora,
      fincas,
      tecnicos,
      completado,
      motivo: completado ? '' : motivo,
      timestamp: new Date().toISOString()
    };
    
    const nuevos = [...contenedores, nuevo];
    setContenedores(nuevos);
    saveContenedores(nuevos);
    
    // Reset form
    setNumero('');
    setFincas([]);
    setTecnicos([]);
    setCompletado(true);
    setMotivo('');
  };

  const eliminarContenedor = (id) => {
    if (!confirm('¿Eliminar este contenedor?')) return;
    const nuevos = contenedores.filter(c => c.id !== id);
    setContenedores(nuevos);
    saveContenedores(nuevos);
  };

  const toggleFinca = (f) => {
    setFincas(prev => prev.includes(f) ? prev.filter(x => x !== f) : [...prev, f]);
  };

  const toggleTecnico = (t) => {
    if (tecnicos.includes(t)) {
      setTecnicos(prev => prev.filter(x => x !== t));
    } else if (tecnicos.length < 2) {
      setTecnicos(prev => [...prev, t]);
    } else {
      alert('Máximo 2 técnicos por contenedor');
    }
  };

  if (loading || !config) {
    return <div style={{ padding: 24 }}>Cargando...</div>;
  }

  const exportadoras = zona ? Object.keys(config.fincas[zona] || {}) : [];
  const fincasDisponibles = zona && exportadora ? (config.fincas[zona]?.[exportadora] || []) : [];

  // Stats
  const total = contenedores.length;
  const completados = contenedores.filter(c => c.completado).length;
  const incompletos = total - completados;

  // Por zona
  const porZona = {};
  contenedores.forEach(c => {
    if (!porZona[c.zona]) porZona[c.zona] = [];
    porZona[c.zona].push(c);
  });

  return (
    <div id="app">
      <div className="topbar">
        <div className="topbar-logo">📦 Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'agregar' ? 'active' : ''}`} onClick={() => setTab('agregar')}>
          ➕ Agregar
        </button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>
          📊 Resumen
        </button>
      </div>

      <div className="main">
        {tab === 'agregar' && (
          <div className="card">
            <div className="card-title">➕ Nuevo Contenedor</div>

            <div className="form-group">
              <label>Fecha</label>
              <input type="date" value={fecha} onChange={e => setFecha(e.target.value)} />
            </div>

            <div className="form-group">
              <label>Número de Contenedor</label>
              <input type="text" placeholder="Ej: 12345 o 12.5" value={numero} onChange={e => setNumero(e.target.value)} />
            </div>

            <div className="form-group">
              <label>Zona</label>
              <select value={zona} onChange={e => { setZona(e.target.value); setExportadora(''); setFincas([]); }}>
                <option value="">-- Selecciona zona --</option>
                {config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
              </select>
            </div>

            {zona && (
              <div className="form-group">
                <label>Exportadora</label>
                <select value={exportadora} onChange={e => { setExportadora(e.target.value); setFincas([]); }}>
                  <option value="">-- Selecciona exportadora --</option>
                  {exportadoras.map(e => <option key={e} value={e}>{e}</option>)}
                </select>
              </div>
            )}

            {exportadora && (
              <div className="form-group">
                <label>Fincas ({fincas.length} seleccionadas)</label>
                <div className="checkbox-list">
                  {fincasDisponibles.map(f => (
                    <div key={f} className="checkbox-item">
                      <input type="checkbox" id={`f-${f}`} checked={fincas.includes(f)} onChange={() => toggleFinca(f)} />
                      <label htmlFor={`f-${f}`}>{f}</label>
                    </div>
                  ))}
                </div>
                {fincas.length > 0 && (
                  <div style={{ marginTop: 8 }}>
                    {fincas.map(f => <span key={f} className="chip">{f}</span>)}
                  </div>
                )}
              </div>
            )}

            <div className="form-group">
              <label>Técnicos ({tecnicos.length}/2)</label>
              <select onChange={e => { if (e.target.value) { toggleTecnico(e.target.value); e.target.value = ''; } }}>
                <option value="">Seleccionar técnico...</option>
                {config.tecnicos.filter(t => !tecnicos.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              {tecnicos.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  {tecnicos.map(t => (
                    <span key={t} className="chip remove" onClick={() => setTecnicos(prev => prev.filter(x => x !== t))}>
                      {t} ✕
                    </span>
                  ))}
                </div>
              )}
            </div>

            <div className="form-group">
              <label>Estado</label>
              <select value={completado ? 'si' : 'no'} onChange={e => setCompletado(e.target.value === 'si')}>
                <option value="si">✓ Completado</option>
                <option value="no">✗ Incompleto</option>
              </select>
            </div>

            {!completado && (
              <div className="form-group">
                <label>Razón de no completación</label>
                <textarea rows={3} placeholder="Explica por qué no se completó..." value={motivo} onChange={e => setMotivo(e.target.value)} />
              </div>
            )}

            <button className="btn primary" onClick={agregarContenedor} style={{ width: '100%', justifyContent: 'center', marginTop: 8 }}>
              ✓ AGREGAR CONTENEDOR
            </button>
          </div>
        )}

        {tab === 'resumen' && (
          <div>
            <div className="stat-grid">
              <div className="stat">
                <div className="stat-val">{total}</div>
                <div className="stat-label">Total</div>
              </div>
              <div className="stat">
                <div className="stat-val">{completados}</div>
                <div className="stat-label">Completados</div>
              </div>
              <div className="stat">
                <div className="stat-val">{incompletos}</div>
                <div className="stat-label">Incompletos</div>
              </div>
            </div>

            {config.zonas.map(z => {
              const conts = porZona[z] || [];
              if (conts.length === 0) return null;
              
              return (
                <div key={z} className="card">
                  <div className="card-title">{z} ({conts.length})</div>
                  <table>
                    <thead>
                      <tr>
                        <th>Fecha</th>
                        <th>N° Contenedor</th>
                        <th>Exportadora</th>
                        <th>Fincas</th>
                        <th>Técnicos</th>
                        <th>Estado</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      {conts.map(c => (
                        <tr key={c.id}>
                          <td>{c.fecha}</td>
                          <td style={{ fontWeight: 700 }}>{c.numero}</td>
                          <td>{c.exportadora}</td>
                          <td style={{ fontSize: 11 }}>{c.fincas.join(', ')}</td>
                          <td style={{ fontSize: 11 }}>{c.tecnicos.join(', ')}</td>
                          <td>
                            {c.completado 
                              ? <span className="badge badge-ok">✓ OK</span>
                              : <span className="badge badge-error">✗ {c.motivo}</span>
                            }
                          </td>
                          <td>
                            <button className="btn sm danger" onClick={() => eliminarContenedor(c.id)}>Eliminar</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })}

            {total === 0 && (
              <div className="card">
                <div className="empty">Sin contenedores registrados</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
