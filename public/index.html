<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificación · Contenedores</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:#f5f7fa;color:#1a1a2e}
  #app{display:flex;flex-direction:column;min-height:100vh}
  
  .topbar{background:#0f2040;color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .topbar-logo{font-size:15px;font-weight:700;letter-spacing:.05em;margin-right:auto}
  .topbar-logo span{color:#f9a825}
  .nav-tab{background:transparent;border:none;color:rgba(255,255,255,.6);padding:0 16px;height:52px;cursor:pointer;font-size:13px;border-bottom:3px solid transparent;transition:.15s;font-weight:500}
  .nav-tab:hover{color:#fff}
  .nav-tab.active{color:#fff;border-bottom-color:#f9a825}
  
  .main{flex:1;padding:20px 24px;max-width:1300px;width:100%;margin:0 auto}
  
  .card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
  .card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:#0f2040}
  
  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;color:#334155;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:.12s}
  .btn:hover{background:#f1f5f9;border-color:#94a3b8}
  .btn.primary{background:#0f2040;color:#fff;border:none}
  .btn.primary:hover{background:#1a3560}
  .btn.amber{background:#f9a825;color:#1a1a2e;border:none}
  .btn.amber:hover{background:#e09720}
  .btn.sm{padding:4px 9px;font-size:11px}
  .btn.danger{color:#dc2626;border-color:#fca5a5}
  .btn.danger:hover{background:#fee2e2}
  
  select{padding:7px 10px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;color:#334155;font-size:13px;cursor:pointer}
  input[type=text],input[type=number]{padding:7px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;background:#fff;color:#1a1a2e;width:100%;max-width:300px}
  input:focus{outline:none;border-color:#0f2040;box-shadow:0 0 0 3px rgba(15,32,64,.08)}
  
  .form-group{margin-bottom:12px}
  .form-group label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;display:block;margin-bottom:5px}
  
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;text-align:center}
  .stat-val{font-size:24px;font-weight:700;color:#0f2040}
  .stat-label{font-size:10px;color:#64748b;margin-top:4px}
  
  .chip{display:inline-block;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:3px 8px;font-size:10px;color:#1e40af;font-weight:500;margin-right:4px;margin-bottom:4px}
  .chip.remove{cursor:pointer}
  .chip.remove:hover{background:#dbeafe}
  
  .container-row{display:flex;display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:8px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto}
  .modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:#0f2040}
  
  .item-compact{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.12s}
  .item-compact:hover{background:#f8fafc;border-color:#cbd5e1}
  
  .item-info{flex:1;font-size:12px;line-height:1.5}
  .item-header{font-weight:600;color:#0f2040;margin-bottom:4px}
  .item-meta{color:#64748b;font-size:11px}
  
  .tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
  .tag-ok{background:#dcfce7;color:#166534}
  .tag-bad{background:#fee2e2;color:#991b1b}
  
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  
  .filter-select{max-width:200px}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState('agregar');
  const [config, setConfig] = useState(null);
  const [contenedores, setContenedores] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  
  // Form estado
  const [numero, setNumero] = useState('');
  const [zona, setZona] = useState('');
  const [exportadora, setExportadora] = useState('');
  const [fincas, setFincas] = useState([]);
  const [tecnicos, setTecnicos] = useState([]);
  const [completado, setCompletado] = useState(true);
  const [motivo, setMotivo] = useState('');
  
  // Modal
  const [showModal, setShowModal] = useState(false);
  const [selectedContainer, setSelectedContainer] = useState(null);
  const [filterZona, setFilterZona] = useState('');

  // Cargar datos
  useEffect(() => {
    Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/contenedores').then(r => r.json())
    ]).then(([cfg, cont]) => {
      setConfig(cfg);
      setContenedores(cont.contenedores || []);
      setLoading(false);
    }).catch(e => {
      console.error(e);
      setLoading(false);
    });
  }, []);

  const guardar = async (newConts) => {
    setSaving(true);
    try {
      await fetch('/api/contenedores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contenedores: newConts })
      });
    } catch (e) {
      console.error('Error guardando:', e);
    }
    setSaving(false);
  };

  const agregarContenedor = () => {
    if (!numero || !zona || fincas.length === 0 || tecnicos.length === 0) {
      alert('Completa: número, zona, fincas y técnicos');
      return;
    }
    if (tecnicos.length === 0 || tecnicos.length > 2) {
      alert('Debe haber 1 o 2 técnicos');
      return;
    }
    
    const newCont = {
      id: Math.random().toString(36).slice(2),
      numero,
      zona,
      exportadora,
      fincas,
      tecnicos,
      completado,
      motivo: completado ? '' : motivo,
      timestamp: new Date().toISOString()
    };
    
    const newConts = [...contenedores, newCont];
    setContenedores(newConts);
    guardar(newConts);
    
    // Limpiar
    setNumero('');
    setZona('');
    setExportadora('');
    setFincas([]);
    setTecnicos([]);
    setCompletado(true);
    setMotivo('');
  };

  const eliminarContenedor = (id) => {
    if (confirm('¿Eliminar este contenedor?')) {
      const newConts = contenedores.filter(c => c.id !== id);
      setContenedores(newConts);
      guardar(newConts);
    }
  };

  const getExportadoras = () => {
    if (!config || !zona) return [];
    return config.fincas[zona] ? Object.keys(config.fincas[zona]) : [];
  };

  const getFincasDeExp = () => {
    if (!config || !zona || !exportadora) return [];
    return config.fincas[zona]?.[exportadora] || [];
  };

  const toggleFinca = (f) => {
    setFincas(fincas.includes(f) ? fincas.filter(x => x !== f) : [...fincas, f]);
  };

  const toggleTecnico = (t) => {
    if (tecnicos.includes(t)) {
      setTecnicos(tecnicos.filter(x => x !== t));
    } else if (tecnicos.length < 2) {
      setTecnicos([...tecnicos, t]);
    } else {
      alert('Máximo 2 técnicos');
    }
  };

  const contsFiltered = filterZona ? contenedores.filter(c => c.zona === filterZona) : contenedores;

  if (loading) return <div style={{padding: 24}}>Cargando...</div>;

  return (
    <div id="app">
      <div className="topbar">
        <div className="topbar-logo">📦 Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'agregar' ? 'active' : ''}`} onClick={() => setTab('agregar')}>➕ Agregar</button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>📊 Resumen</button>
        {saving && <span style={{fontSize: 11, color: '#f9a825'}}>Guardando...</span>}
      </div>

      <div className="main">
        {tab === 'agregar' && (
          <div className="card">
            <div className="card-title">Nuevo Contenedor</div>
            
            <div className="form-group">
              <label>Número (ej: 12345 o 12345.5)</label>
              <input type="text" placeholder="12345.5" value={numero} onChange={e => setNumero(e.target.value)}/>
            </div>

            <div className="form-group">
              <label>Zona</label>
              <select value={zona} onChange={e => { setZona(e.target.value); setExportadora(''); setFincas([]); }}>
                <option value="">-- Selecciona zona --</option>
                {config && config.zonas && config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
              </select>
            </div>

            {zona && (
              <div className="form-group">
                <label>Exportadora</label>
                <select value={exportadora} onChange={e => { setExportadora(e.target.value); setFincas([]); }}>
                  <option value="">-- Selecciona exportadora --</option>
                  {getExportadoras().map(e => <option key={e} value={e}>{e}</option>)}
                </select>
              </div>
            )}

            {exportadora && (
              <div className="form-group">
                <label>Fincas ({fincas.length} seleccionadas)</label>
                <div style={{maxHeight: 200, overflowY: 'auto', border: '1px solid #e2e8f0', borderRadius: 6, padding: 10}}>
                  {getFincasDeExp().map(f => (
                    <div key={f} style={{display: 'flex', align: 'center', gap: 8, padding: 6, cursor: 'pointer'}}>
                      <input type="checkbox" checked={fincas.includes(f)} onChange={() => toggleFinca(f)}/>
                      <label style={{cursor: 'pointer', flex: 1, margin: 0}}>{f}</label>
                    </div>
                  ))}
                </div>
                {fincas.length > 0 && <div style={{marginTop: 8}}>
                  {fincas.map(f => <span key={f} className="chip">{f}</span>)}
                </div>}
              </div>
            )}

            <div className="form-group">
              <label>Técnicos ({tecnicos.length}/2)</label>
              <select onChange={e => { if (e.target.value) toggleTecnico(e.target.value); e.target.value = ''; }}>
                <option value="">Buscar y agregar técnico...</option>
                {config && config.tecnicos && config.tecnicos.filter(t => !tecnicos.includes(t)).map(t => 
                  <option key={t} value={t}>{t}</option>
                )}
              </select>
              {tecnicos.length > 0 && <div style={{marginTop: 8}}>
                {tecnicos.map(t => (
                  <span key={t} className="chip remove" onClick={() => setTecnicos(tecnicos.filter(x => x !== t))}>
                    {t} ✕
                  </span>
                ))}
              </div>}
            </div>

            <div className="form-group">
              <label>Estado</label>
              <select value={completado ? 'completo' : 'incompleto'} onChange={e => setCompletado(e.target.value === 'completo')}>
                <option value="completo">✓ Completado</option>
                <option value="incompleto">✗ Incompleto</option>
              </select>
            </div>

            {!completado && (
              <div className="form-group">
                <label>Razón de no completación</label>
                <input type="text" placeholder="Ej: Falta de técnicos, clima..." value={motivo} onChange={e => setMotivo(e.target.value)}/>
              </div>
            )}

            <button className="btn amber" onClick={agregarContenedor} style={{width: '100%', marginTop: 16, padding: '10px'}}>
              ✓ Agregar Contenedor
            </button>
          </div>
        )}

        {tab === 'resumen' && (
          <div>
            <div className="stat-grid">
              <div className="stat">
                <div className="stat-val">{contenedores.length}</div>
                <div className="stat-label">Total</div>
              </div>
              <div className="stat">
                <div className="stat-val">{contenedores.filter(c => c.completado).length}</div>
                <div className="stat-label">Completos</div>
              </div>
              <div className="stat">
                <div className="stat-val">{contenedores.filter(c => !c.completado).length}</div>
                <div className="stat-label">Incompletos</div>
              </div>
            </div>

            <div className="card">
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14}}>
                <div className="card-title">Contenedores</div>
                {config && config.zonas && (
                  <select className="filter-select" value={filterZona} onChange={e => setFilterZona(e.target.value)}>
                    <option value="">Todas las zonas</option>
                    {config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
                  </select>
                )}
              </div>

              {contsFiltered.length === 0 ? (
                <div style={{textAlign: 'center', color: '#64748b', padding: 20}}>Sin contenedores</div>
              ) : (
                contsFiltered.map(c => (
                  <div key={c.id} className="item-compact">
                    <div className="item-info">
                      <div className="item-header">
                        #{c.numero} • <span style={{color: '#64748b'}}>{c.zona}</span> • <span style={{color: '#64748b'}}>{c.exportadora}</span>
                      </div>
                      <div className="item-meta">
                        {c.fincas.length} fincas • {c.tecnicos.map(t => <span key={t} className="chip" style={{marginRight: 2}}>{t.split(' ')[0]}</span>)} • <span className={`tag ${c.completado ? 'tag-ok' : 'tag-bad'}`}>{c.completado ? '✓ OK' : `✗ ${c.motivo}`}</span>
                      </div>
                    </div>
                    <div style={{display: 'flex', gap: 8}}>
                      <button className="btn sm" onClick={() => { setSelectedContainer(c); setShowModal(true); }}>Detalles</button>
                      <button className="btn sm danger" onClick={() => eliminarContenedor(c.id)}>✕</button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        )}
      </div>

      {/* Modal Detalles */}
      <div className={`modal-overlay ${showModal ? 'open' : ''}`} onClick={() => setShowModal(false)}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          {selectedContainer && (
            <div>
              <h2>Contenedor #{selectedContainer.numero}</h2>
              
              <div style={{marginTop: 16, fontSize: 13}}>
                <div style={{marginBottom: 12}}>
                  <strong>Zona:</strong> {selectedContainer.zona}
                </div>
                <div style={{marginBottom: 12}}>
                  <strong>Exportadora:</strong> {selectedContainer.exportadora}
                </div>
                <div style={{marginBottom: 12}}>
                  <strong>Fincas ({selectedContainer.fincas.length}):</strong>
                  <div>{selectedContainer.fincas.map(f => <span key={f} className="chip">{f}</span>)}</div>
                </div>
                <div style={{marginBottom: 12}}>
                  <strong>Técnicos ({selectedContainer.tecnicos.length}):</strong>
                  <div>{selectedContainer.tecnicos.map(t => <span key={t} className="chip">{t}</span>)}</div>
                </div>
                <div style={{marginBottom: 12}}>
                  <strong>Estado:</strong> <span className={`tag ${selectedContainer.completado ? 'tag-ok' : 'tag-bad'}`}>{selectedContainer.completado ? '✓ Completado' : '✗ Incompleto'}</span>
                </div>
                {!selectedContainer.completado && (
                  <div style={{marginBottom: 12}}>
                    <strong>Razón:</strong> {selectedContainer.motivo}
                  </div>
                )}
                <div style={{fontSize: 11, color: '#94a3b8', marginTop: 16}}>
                  {new Date(selectedContainer.timestamp).toLocaleString('es-ES')}
                </div>
              </div>
            </div>
          )}
          <button className="btn primary" onClick={() => setShowModal(false)} style={{marginTop: 20, width: '100%'}}>Cerrar</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState('add');
  const [config, setConfig] = useState(null);
  const [contenedores, setContenedores] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  
  // Nuevo contenedor
  const [newContainer, setNewContainer] = useState({
    numero: '',
    zona: '',
    exportadora: '',
    fincas: [],
    tecnicos: [],
    motivo: '',
    completado: true
  });
  
  const [showFincasModal, setShowFincasModal] = useState(false);
  const [showDetailsModal, setShowDetailsModal] = useState(false);
  const [selectedContainer, setSelectedContainer] = useState(null);

  useEffect(() => {
    fetch('/api/config').then(r => r.json()).then(data => {
      setConfig(data);
      setLoading(false);
    });
    
    fetch('/api/semanas').then(r => r.json()).then(data => {
      setContenedores(data.contenedores || []);
    });
  }, []);

  const saveContenedores = (arr) => {
    setContenedores(arr);
    setSaving(true);
    fetch('/api/semanas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contenedores: arr })
    }).then(() => setSaving(false));
  };

  const getFincasDeExportadora = () => {
    if (!config || !newContainer.zona || !newContainer.exportadora) return [];
    const zona = config.monoZonas[newContainer.zona];
    if (!zona) return [];
    return zona.exportadoras[newContainer.exportadora] || [];
  };

  const addContenedor = () => {
    if (!newContainer.numero || !newContainer.zona || newContainer.fincas.length === 0 || newContainer.tecnicos.length === 0) {
      alert('Completa: número, zona, fincas y técnicos');
      return;
    }
    const cont = {
      id: Math.random().toString(36).slice(2),
      ...newContainer,
      timestamp: new Date().toISOString()
    };
    saveContenedores([...contenedores, cont]);
    setNewContainer({
      numero: '',
      zona: '',
      exportadora: '',
      fincas: [],
      tecnicos: [],
      motivo: '',
      completado: true
    });
  };

  const deleteContenedor = (id) => {
    if (confirm('¿Eliminar este contenedor?')) {
      saveContenedores(contenedores.filter(c => c.id !== id));
    }
  };

  const toggleFinca = (finca) => {
    const currently = newContainer.fincas.includes(finca);
    setNewContainer({
      ...newContainer,
      fincas: currently ? newContainer.fincas.filter(f => f !== finca) : [...newContainer.fincas, finca]
    });
  };

  const toggleTecnico = (tecnico) => {
    const currently = newContainer.tecnicos.includes(tecnico);
    if (currently) {
      setNewContainer({
        ...newContainer,
        tecnicos: newContainer.tecnicos.filter(t => t !== tecnico)
      });
    } else if (newContainer.tecnicos.length < 2) {
      setNewContainer({
        ...newContainer,
        tecnicos: [...newContainer.tecnicos, tecnico]
      });
    }
  };

  if (loading || !config) return <div style={{padding: 24}}>Cargando...</div>;

  const fincasDeExportadora = getFincasDeExportadora();

  return (
    <div id="app">
      <div className="topbar">
        <div className="topbar-logo">Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'add' ? 'active' : ''}`} onClick={() => setTab('add')}>➕ Agregar</button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>📊 Resumen</button>
        {saving && <div style={{marginLeft: 'auto', color: '#F9A825'}}>Guardando...</div>}
      </div>

      <div className="main">
        {tab === 'add' && (
          <div className="card">
            <div className="card-title">Nuevo Contenedor</div>
            
            <div className="form-row">
              <label>Número de Contenedor</label>
              <input type="text" placeholder="Ej: 12345 o 12345.5" value={newContainer.numero} 
                onChange={e => setNewContainer({...newContainer, numero: e.target.value})}/>
            </div>

            <div className="form-row">
              <label>Zona</label>
              <select value={newContainer.zona} onChange={e => {
                setNewContainer({...newContainer, zona: e.target.value, exportadora: '', fincas: []});
              }}>
                <option value="">-- Selecciona una zona --</option>
                {config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
              </select>
            </div>

            {newContainer.zona && (
              <div className="form-row">
                <label>Exportadora</label>
                <select value={newContainer.exportadora} onChange={e => setNewContainer({...newContainer, exportadora: e.target.value, fincas: []})}>
                  <option value="">-- Selecciona exportadora --</option>
                  {Object.keys(config.monoZonas[newContainer.zona]?.exportadoras || {}).map(exp => 
                    <option key={exp} value={exp}>{exp}</option>
                  )}
                </select>
              </div>
            )}

            {newContainer.exportadora && (
              <div className="form-row">
                <label>Fincas ({newContainer.fincas.length} seleccionadas)</label>
                <button className="btn primary" onClick={() => setShowFincasModal(true)}>
                  Seleccionar Fincas →
                </button>
                {newContainer.fincas.length > 0 && (
                  <div>
                    {newContainer.fincas.map(f => (
                      <span key={f} className="chip">{f}</span>
                    ))}
                  </div>
                )}
              </div>
            )}

            <div className="form-row">
              <label>Técnicos ({newContainer.tecnicos.length}/2)</label>
              <select onChange={e => {
                if (e.target.value && !newContainer.tecnicos.includes(e.target.value) && newContainer.tecnicos.length < 2) {
                  setNewContainer({...newContainer, tecnicos: [...newContainer.tecnicos, e.target.value]});
                  e.target.value = '';
                }
              }}>
                <option value="">Buscar y agregar técnico...</option>
                {config.tecnicos.filter(t => !newContainer.tecnicos.includes(t)).map(t => 
                  <option key={t} value={t}>{t}</option>
                )}
              </select>
              {newContainer.tecnicos.length > 0 && (
                <div>
                  {newContainer.tecnicos.map(t => (
                    <div key={t} className="list-item" style={{marginBottom: 6}}>
                      <span>{t}</span>
                      <button className="btn sm danger" onClick={() => setNewContainer({...newContainer, tecnicos: newContainer.tecnicos.filter(x => x !== t)})}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="form-row">
              <label>Estado</label>
              <select value={newContainer.completado ? 'completado' : 'incompleto'} onChange={e => setNewContainer({...newContainer, completado: e.target.value === 'completado'})}>
                <option value="completado">✓ Completado</option>
                <option value="incompleto">✗ Incompleto</option>
              </select>
            </div>

            {!newContainer.completado && (
              <div className="form-row">
                <label>Razón de no completación</label>
                <input type="text" placeholder="Ej: Falta de técnicos, Clima, etc." value={newContainer.motivo}
                  onChange={e => setNewContainer({...newContainer, motivo: e.target.value})}/>
              </div>
            )}

            <button className="btn amber" onClick={addContenedor} style={{marginTop: 14, width: '100%'}}>
              ✓ Agregar Contenedor
            </button>
          </div>
        )}

        {tab === 'resumen' && (
          <div>
            <div className="stat-grid">
              <div className="stat-box">
                <div className="stat-val">{contenedores.length}</div>
                <div className="stat-label">Contenedores</div>
              </div>
              <div className="stat-box">
                <div className="stat-val">{contenedores.filter(c => c.completado).length}</div>
                <div className="stat-label">Completados</div>
              </div>
              <div className="stat-box">
                <div className="stat-val">{contenedores.filter(c => !c.completado).length}</div>
                <div className="stat-label">Incompletos</div>
              </div>
            </div>

            <div className="card">
              <div className="card-title">Contenedores por Zona</div>
              {config.zonas.map(zona => {
                const contsDeLaZona = contenedores.filter(c => c.zona === zona);
                if (contsDeLaZona.length === 0) return null;
                return (
                  <div key={zona} className="accordion">
                    <div className="accordion-header" onClick={e => {
                      e.currentTarget.nextElementSibling?.classList.toggle('open');
                    }}>
                      <h3>{zona}</h3>
                      <span>{contsDeLaZona.length} contenedores</span>
                    </div>
                    <div className="accordion-body">
                      {contsDeLaZona.map(c => (
                        <div key={c.id} className="list-item">
                          <div>
                            <div style={{fontWeight: 600, marginBottom: 4}}>#{c.numero}</div>
                            <div style={{fontSize: 11, color: '#64748b', marginBottom: 6}}>
                              {c.exportadora} • {c.fincas.length} fincas • {c.tecnicos.length} técnicos
                            </div>
                            {c.completado ? <span className="tag-ok">✓ Completado</span> : <span className="tag-bad">✗ Incompleto: {c.motivo}</span>}
                          </div>
                          <div style={{display: 'flex', gap: 8}}>
                            <button className="btn sm" onClick={() => { setSelectedContainer(c); setShowDetailsModal(true); }}>
                              Detalles
                            </button>
                            <button className="btn sm danger" onClick={() => deleteContenedor(c.id)}>Eliminar</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Modal de Fincas */}
      <div className={`modal-overlay ${showFincasModal ? 'open' : ''}`} onClick={() => setShowFincasModal(false)}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          <h2>Seleccionar Fincas · {newContainer.exportadora}</h2>
          <div style={{marginTop: 16}}>
            {fincasDeExportadora.map(finca => (
              <div key={finca} className="list-item" onClick={() => toggleFinca(finca)}>
                <span>{finca}</span>
                <input type="checkbox" checked={newContainer.fincas.includes(finca)} readOnly style={{cursor: 'pointer'}}/>
              </div>
            ))}
          </div>
          <button className="btn primary" onClick={() => setShowFincasModal(false)} style={{marginTop: 16, width: '100%'}}>
            Listo
          </button>
        </div>
      </div>

      {/* Modal de Detalles */}
      <div className={`modal-overlay ${showDetailsModal ? 'open' : ''}`} onClick={() => setShowDetailsModal(false)}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          {selectedContainer && (
            <div>
              <h2>Detalles · Contenedor #{selectedContainer.numero}</h2>
              <div style={{marginTop: 16}}>
                <div className="form-row">
                  <label>Zona</label>
                  <div style={{padding: 8, background: '#F8FAFC', borderRadius: 6}}>{selectedContainer.zona}</div>
                </div>
                <div className="form-row">
                  <label>Exportadora</label>
                  <div style={{padding: 8, background: '#F8FAFC', borderRadius: 6}}>{selectedContainer.exportadora}</div>
                </div>
                <div className="form-row">
                  <label>Fincas ({selectedContainer.fincas.length})</label>
                  <div>{selectedContainer.fincas.map(f => <span key={f} className="chip">{f}</span>)}</div>
                </div>
                <div className="form-row">
                  <label>Técnicos ({selectedContainer.tecnicos.length})</label>
                  <div>{selectedContainer.tecnicos.map(t => <span key={t} className="chip">{t}</span>)}</div>
                </div>
                <div className="form-row">
                  <label>Estado</label>
                  <div>{selectedContainer.completado ? <span className="tag-ok">✓ Completado</span> : <span className="tag-bad">✗ Incompleto</span>}</div>
                </div>
                {!selectedContainer.completado && (
                  <div className="form-row">
                    <label>Razón</label>
                    <div style={{padding: 8, background: '#FEE2E2', borderRadius: 6, color: '#991b1b'}}>{selectedContainer.motivo}</div>
                  </div>
                )}
              </div>
            </div>
          )}
          <button className="btn primary" onClick={() => setShowDetailsModal(false)} style={{marginTop: 16, width: '100%'}}>Cerrar</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificación Semanal · Contenedores</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:#F5F7FA;color:#1a1a2e;min-height:100vh}
  #root{display:flex;flex-direction:column;min-height:100vh}

  /* Top bar */
  .topbar{background:#0F2040;color:#fff;padding:0 24px;display:flex;align-items:center;gap:0;height:52px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .topbar-logo{font-size:15px;font-weight:600;letter-spacing:.02em;margin-right:32px;white-space:nowrap}
  .topbar-logo span{color:#F9A825}
  .nav-tab{background:transparent;border:none;color:rgba(255,255,255,.65);padding:0 18px;height:52px;cursor:pointer;font-size:13px;border-bottom:3px solid transparent;transition:.15s}
  .nav-tab:hover{color:#fff;background:rgba(255,255,255,.07)}
  .nav-tab.active{color:#fff;border-bottom-color:#F9A825;font-weight:500}
  .topbar-right{margin-left:auto;font-size:11px;color:rgba(255,255,255,.4)}

  /* Layout */
  .main{flex:1;padding:20px 24px;max-width:1400px;width:100%;margin:0 auto}

  /* Cards */
  .card{background:#fff;border-radius:10px;border:1px solid #E2E8F0;padding:18px 20px;margin-bottom:16px}
  .card-title{font-size:14px;font-weight:600;margin-bottom:14px;color:#0F2040}

  /* Stat grid */
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px;text-align:center}
  .stat-label{font-size:11px;color:#64748b;margin-bottom:6px}
  .stat-val{font-size:26px;font-weight:700;color:#0F2040}
  .stat-val.green{color:#16a34a}
  .stat-val.amber{color:#b45309}
  .stat-val.red{color:#dc2626}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid #CBD5E1;border-radius:7px;background:#fff;color:#334155;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:.12s}
  .btn:hover{background:#F1F5F9;border-color:#94A3B8}
  .btn.primary{background:#0F2040;color:#fff;border-color:#0F2040}
  .btn.primary:hover{background:#1a3560}
  .btn.amber{background:#F9A825;color:#1a1a2e;border-color:#F9A825}
  .btn.amber:hover{background:#e09720}
  .btn.sm{padding:4px 9px;font-size:11px}
  .btn.danger{color:#dc2626;border-color:#fca5a5}
  .btn.danger:hover{background:#FEF2F2}

  /* Select */
  select{padding:7px 10px;border:1px solid #CBD5E1;border-radius:7px;background:#fff;color:#334155;font-size:13px;cursor:pointer;min-width:180px}
  select:focus{outline:none;border-color:#0F2040}

  /* Inputs */
  input[type=text],input[type=number].wide,textarea{width:100%;padding:7px 10px;border:1px solid #CBD5E1;border-radius:7px;font-size:13px;background:#fff;color:#1a1a2e}
  input[type=text]:focus,textarea:focus{outline:none;border-color:#0F2040;box-shadow:0 0 0 3px rgba(15,32,64,.08)}
  textarea{resize:vertical;min-height:52px;font-family:inherit}
  input[type=number]{width:40px;padding:4px 5px;border:1px solid #CBD5E1;border-radius:5px;text-align:center;font-size:12px;background:#fff;color:#1a1a2e}
  input[type=number]:focus{outline:none;border-color:#0F2040}

  /* Form grid */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .form-row{display:flex;flex-direction:column;gap:5px}
  .form-row label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .form-row.full{grid-column:1/-1}

  /* Inline form panel */
  .panel{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:16px;margin-bottom:14px}
  .panel h3{font-size:13px;font-weight:600;margin-bottom:12px;color:#0F2040}

  /* Table */
  .tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #E2E8F0}
  table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
  th,td{padding:7px 9px;border-bottom:1px solid #F1F5F9;text-align:center;vertical-align:middle;white-space:nowrap}
  th{background:#F8FAFC;font-weight:600;font-size:11px;color:#475569;border-bottom:1px solid #E2E8F0;position:sticky;top:0;z-index:1}
  td.left{text-align:left}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#FAFBFC}
  .exp-row td{background:#EFF6FF;font-weight:700;font-size:11px;color:#1e40af;letter-spacing:.04em;border-top:2px solid #BFDBFE;border-bottom:1px solid #BFDBFE}
  .exp-row:hover td{background:#EFF6FF}

  /* Cell colors */
  .cell-ok{background:#DCFCE7 !important}
  .cell-warn{background:#FEF9C3 !important}
  .cell-bad{background:#FEE2E2 !important}

  /* Tags */
  .tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .tag-ok{background:#DCFCE7;color:#166534}
  .tag-warn{background:#FEF9C3;color:#854d0e}
  .tag-bad{background:#FEE2E2;color:#991b1b}
  .tag-gray{background:#F1F5F9;color:#475569}

  /* Motivo panel */
  .motivo-panel{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px 14px;margin-top:4px}
  .motivo-panel h4{font-size:11px;font-weight:600;color:#854d0e;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
  .motivo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .motivo-item{background:#fff;border:1px solid #FDE68A;border-radius:7px;padding:8px 10px}
  .motivo-item label{font-size:10px;font-weight:700;color:#92400e;display:block;margin-bottom:5px}

  /* Accordion (fincas view) */
  .accordion{border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:10px}
  .accordion-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#F8FAFC;cursor:pointer;user-select:none;transition:.12s}
  .accordion-header:hover{background:#EFF6FF}
  .accordion-header h3{font-size:13px;font-weight:600;color:#0F2040}
  .accordion-body{padding:14px 16px;border-top:1px solid #E2E8F0}

  /* Chip */
  .chip{display:inline-block;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:20px;padding:3px 10px;font-size:11px;color:#1e40af;font-weight:500}

  /* Alert */
  .alert{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px 16px;font-size:13px;color:#1e40af;margin-bottom:14px}
  .alert-warn{background:#FFFBEB;border-color:#FDE68A;color:#854d0e}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:#64748b;font-size:14px}

  /* Separator */
  .sep{height:1px;background:#E2E8F0;margin:14px 0}

  /* Subheader row */
  .subhdr td{font-size:10px;font-weight:600;color:#94a3b8;background:#FAFAFA;padding:3px 9px;border-bottom:1px solid #E2E8F0}
  .subhdr:hover td{background:#FAFAFA}
</style>
</head>

// ── API helpers ────────────────────────────────────────────────────────────
async function apiGet(path){
  const r=await fetch(path);
  if(!r.ok)throw new Error(r.statusText);
  return r.json();
}
async function apiPost(path,body){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(r.statusText);
  return r.json();
}

                  config.exportadoras.map(exp=>{
                    let expTP=0,expTI=0;
                    const fRows=exp.fincas.map(f=>{
                      let fTP=0,fTI=0;
                      const semCells=semKeys.flatMap(sk=>{
                        const{tp,ti}=fincaTotals(sk,f.id);
                        fTP+=tp;fTI+=ti;expTP+=tp;expTI+=ti;
                        return[
                          React.createElement('td',{key:sk+'p'},tp||''),
                          React.createElement('td',{key:sk+'i'},ti||'')
                        ];
                      });
                      const fp=fTP>0?Math.round(fTI/fTP*100):null;
                      return React.createElement('tr',{key:f.id},
                        React.createElement('td',{className:'left',style:{color:'#94a3b8',fontSize:11}}),
                        React.createElement('td',{className:'left',style:{paddingLeft:18,fontWeight:500}},f.nombre),
                        ...semCells,
                        React.createElement('td',{style:{fontWeight:600,background:'#F0F9FF'}},fTP||''),
                        React.createElement('td',{style:{background:'#F0F9FF'}},fTI||''),
                        React.createElement('td',{style:{background:'#F0F9FF'}},
                          fp!==null?React.createElement('span',{className:`tag tag-${fp>=100?'ok':fp>=70?'warn':'bad'}`},fp+'%'):''
                        )
                      );
                    });
                    const ep=expTP>0?Math.round(expTI/expTP*100):null;
                    return[
                      React.createElement('tr',{key:'hd'+exp.id,className:'exp-row'},
                        React.createElement('td',{className:'left',colSpan:2,style:{paddingLeft:12}},exp.nombre),
                        semKeys.flatMap(sk=>{
                          let sp=0,si=0;
                          exp.fincas.forEach(f=>{const{tp,ti}=fincaTotals(sk,f.id);sp+=tp;si+=ti;});
                          return[React.createElement('td',{key:sk+'p'},sp||''),React.createElement('td',{key:sk+'i'},si||'')];
                        }),
                        React.createElement('td',{style:{fontWeight:700,background:'#EFF6FF'}},expTP||''),
                        React.createElement('td',{style:{background:'#EFF6FF'}},expTI||''),
                        React.createElement('td',{style:{background:'#EFF6FF'}},
                          ep!==null?React.createElement('span',{className:`tag tag-${ep>=100?'ok':ep>=70?'warn':'bad'}`},ep+'%'):''
                        )
                      ),
                      ...fRows
                    ];
                  })
                )
              )
            )
          )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
