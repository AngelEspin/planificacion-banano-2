body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: #f5f7fa; color: #1a1a2e; }

.nav-tab:hover { color: #fff; }
.nav-tab.active { color: #fff; border-bottom-color: #f9a825; }
.main { flex: 1; padding: 20px 24px; max-width: 1400px; width: 100%; margin: 0 auto; }

.card-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #0f2040; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; cursor: pointer; font-size: 12px; font-weight: 500; transition: .12s; }
.btn:hover { background: #f1f5f9; border-color: #94a3b8; }
.btn.primary { background: #0f2040; color: #fff; border: none; }
.btn.primary:hover { background: #1a3560; }
.btn.amber { background: #f9a825; color: #1a1a2e; border: none; font-weight: 600; }
.btn.amber:hover { background: #e09720; }
.btn.sm { padding: 4px 9px; font-size: 11px; }
.btn.danger { color: #dc2626; border-color: #fca5a5; }
.btn.danger:hover { background: #fee2e2; }
select, input, textarea { padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a2e; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #0f2040; box-shadow: 0 0 0 3px rgba(15,32,64,.08); }
input[type=number] { max-width: 120px; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 700; color: #0f2040; }
.stat-label { font-size: 10px; color: #64748b; margin-top: 4px; }
.chip { display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 4px 8px; font-size: 10px; color: #1e40af; font-weight: 500; margin-right: 4px; margin-bottom: 4px; }
.chip.remove { cursor: pointer; }
.chip.remove:hover { background: #dbeafe; }
.checkbox-list { max-height: 150px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; }
.checkbox-item { display: flex; align-items: center; gap: 8px; padding: 4px; cursor: pointer; }
.checkbox-item:hover { background: #f8fafc; border-radius: 4px; }
.checkbox-item input { cursor: pointer; }
.checkbox-item label { cursor: pointer; flex: 1; margin: 0; }
.tree-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
.tree-header { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; color: #0f2040; }
.tree-icon { width: 20px; text-align: center; transition: .15s; }
.tree-header:hover { color: #0f2040; }
.tree-content { max-height: 0; overflow: hidden; transition: max-height .15s; }
.tree-content.open { max-height: 2000px; }
.tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.tag-ok { background: #dcfce7; color: #166534; }
.tag-bad { background: #fee2e2; color: #991b1b; }
.modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 8px; padding: 24px; max-width: 600px; width: 90%; z-index: 999; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
.modal.open { display: block; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 990; }
.modal-overlay.open { display: block; }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #0f2040; }
.modal-buttons { display: flex; gap: 8px; margin-top: 20px; }

</style>
</head>
<body>
<div id="app"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState('agregar');
  const [config, setConfig] = useState(null);
  const [planificaciones, setPlanificaciones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [expandedZonas, setExpandedZonas] = useState({});
  const [expandedExportadoras, setExpandedExportadoras] = useState({});

  // Formulario
  const [formZona, setFormZona] = useState('');
  const [formExportadora, setFormExportadora] = useState('');
  const [formCantidad, setFormCantidad] = useState('');
  const [formFincas, setFormFincas] = useState([]);
  const [formTecnicos, setFormTecnicos] = useState([]);
  const [formCompletado, setFormCompletado] = useState(true);
  const [formMotivo, setFormMotivo] = useState('');

  useEffect(() => {
    Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/contenedores').then(r => r.json())
    ])
    .then(([cfg, cont]) => {
      setConfig(cfg);
      setPlanificaciones(cont.contenedores || []);
      setLoading(false);
    })
    .catch(e => { console.error(e); setLoading(false); });
  }, []);

  const guardar = async (newPlans) => {
    setSaving(true);
    try {
      await fetch('/api/contenedores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contenedores: newPlans })
      });
    } catch(e) { console.error('Error:', e); }
    setSaving(false);
  };

  const agregarPlanificacion = () => {
    if (!formCantidad || !formZona || !formExportadora || formFincas.length === 0 || formTecnicos.length === 0) {
      alert('Completa: zona, exportadora, cantidad, fincas y técnicos');
      return;
    }
    const newPlan = {
      id: Math.random().toString(36).slice(2),
      zona: formZona,
      exportadora: formExportadora,
      cantidad: parseFloat(formCantidad),
      fincas: formFincas,
      tecnicos: formTecnicos,
      completado: formCompletado,
      motivo: formCompletado ? '' : formMotivo,
      timestamp: new Date().toISOString()
    };
    const newPlans = [...planificaciones, newPlan];
    setPlanificaciones(newPlans);
    guardar(newPlans);
    setFormZona('');
    setFormExportadora('');
    setFormCantidad('');
    setFormFincas([]);
    setFormTecnicos([]);
    setFormCompletado(true);
    setFormMotivo('');
  };

  const eliminarPlanificacion = (id) => {
    if (confirm('¿Eliminar?')) {
      const newPlans = planificaciones.filter(p => p.id !== id);
      setPlanificaciones(newPlans);
      guardar(newPlans);
    }
  };

  const getExportadoras = (zona) => config && zona ? Object.keys(config.fincas[zona] || {}) : [];
  const getFincas = (zona, exportadora) => config && zona && exportadora ? config.fincas[zona]?.[exportadora] || [] : [];
  
  const toggleFinca = (f) => setFormFincas(formFincas.includes(f) ? formFincas.filter(x => x !== f) : [...formFincas, f]);
  const toggleTecnico = (t) => setFormTecnicos(formTecnicos.includes(t) ? formTecnicos.filter(x => x !== t) : [...formTecnicos, t]);

  const toggleZona = (zona) => setExpandedZonas({...expandedZonas, [zona]: !expandedZonas[zona]});
  const toggleExportadora = (key) => setExpandedExportadoras({...expandedExportadoras, [key]: !expandedExportadoras[key]});

  const buildResumen = () => {
    const resumen = {};
    planificaciones.forEach(p => {
      if (!resumen[p.zona]) resumen[p.zona] = {};
      if (!resumen[p.zona][p.exportadora]) resumen[p.zona][p.exportadora] = { total: 0, completo: 0, items: [] };
      resumen[p.zona][p.exportadora].total += p.cantidad;
      if (p.completado) resumen[p.zona][p.exportadora].completo += p.cantidad;
      resumen[p.zona][p.exportadora].items.push(p);
    });
    return resumen;
  };

  if (loading) return <div style={{ padding: 24, textAlign: 'center' }}>Cargando...</div>;

  const resumen = buildResumen();
  const totalContenedores = planificaciones.reduce((sum, p) => sum + p.cantidad, 0);
  const totalCompletos = planificaciones.reduce((sum, p) => sum + (p.completado ? p.cantidad : 0), 0);

  return (
    <div id="app">
      <div className="topbar">
        <div className="topbar-logo">📦 Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'agregar' ? 'active' : ''}`} onClick={() => setTab('agregar')}>➕ Agregar</button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>📊 Resumen</button>
        {saving && <span style={{ fontSize: 11, color: '#f9a825' }}>Guardando...</span>}
      </div>
      <div className="main">
        {tab === 'agregar' && (
          <div className="card">
            <div className="card-title">➕ Agregar Planificación</div>
            <div className="form-row">
              <div className="form-group">
                <label>Zona</label>
                <select value={formZona} onChange={e => { setFormZona(e.target.value); setFormExportadora(''); setFormFincas([]); }}>
                  <option value="">-- Selecciona --</option>
                  {config?.zonas?.map(z => <option key={z} value={z}>{z}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Exportadora</label>
                <select value={formExportadora} onChange={e => { setFormExportadora(e.target.value); setFormFincas([]); }}>
                  <option value="">-- Selecciona --</option>
                  {getExportadoras(formZona).map(e => <option key={e} value={e}>{e}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Cantidad (ej: 1, 2, 1.5)</label>
                <input type="number" step="0.5" min="0" placeholder="1" value={formCantidad} onChange={e => setFormCantidad(e.target.value)}/>
              </div>
            </div>

            {formExportadora && (
              <div className="form-group">
                <label>Fincas ({formFincas.length} seleccionadas)</label>
                <div className="checkbox-list">
                  {getFincas(formZona, formExportadora).map(f => (
                    <div key={f} className="checkbox-item">
                      <input type="checkbox" id={f} checked={formFincas.includes(f)} onChange={() => toggleFinca(f)}/>
                      <label htmlFor={f}>{f}</label>
                    </div>
                  ))}
                </div>
                {formFincas.length > 0 && <div style={{ marginTop: 8 }}>{formFincas.map(f => <span key={f} className="chip">{f}</span>)}</div>}
              </div>
            )}

            <div className="form-group">
              <label>Técnicos Asignados ({formTecnicos.length})</label>
              <select onChange={e => { if (e.target.value) toggleTecnico(e.target.value); e.target.value = ''; }}>
                <option value="">+ Agregar técnico</option>
                {config?.tecnicos?.filter(t => !formTecnicos.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              {formTecnicos.length > 0 && <div style={{ marginTop: 8 }}>{formTecnicos.map(t => (<span key={t} className="chip remove" onClick={() => toggleTecnico(t)}>{t} ✕</span>))}</div>}
            </div>

            <div className="form-group">
              <label>Estado</label>
              <select value={formCompletado ? 'completo' : 'incompleto'} onChange={e => setFormCompletado(e.target.value === 'completo')}>
                <option value="completo">✓ Completado</option>
                <option value="incompleto">✗ Incompleto</option>
              </select>
            </div>

            {!formCompletado && (
              <div className="form-group">
                <label>Motivo de no completación</label>
                <textarea placeholder="Ej: Falta de disponibilidad de técnicos..." value={formMotivo} onChange={e => setFormMotivo(e.target.value)} style={{ minHeight: 60 }}/>
              </div>
            )}

            <button className="btn amber" onClick={agregarPlanificacion} style={{ width: '100%', padding: '10px', fontSize: '13px' }}>✓ AGREGAR PLANIFICACIÓN</button>
          </div>
        )}

        {tab === 'resumen' && (
          <div>
            <div className="stat-grid">
              <div className="stat"><div className="stat-val">{totalContenedores}</div><div className="stat-label">Total Contenedores</div></div>
              <div className="stat"><div className="stat-val">{totalCompletos}</div><div className="stat-label">Completados</div></div>
              <div className="stat"><div className="stat-val">{(totalContenedores - totalCompletos).toFixed(1)}</div><div className="stat-label">Pendientes</div></div>
            </div>

            <div className="card">
              <div className="card-title">Resumen por Zona</div>
              {Object.keys(resumen).length === 0 ? (
                <div style={{ textAlign: 'center', color: '#64748b', padding: 20 }}>Sin planificaciones</div>
              ) : (
                Object.keys(resumen).map(zona => (
                  <div key={zona} className="tree-item">
                    <div className="tree-header" onClick={() => toggleZona(zona)}>
                      <span className="tree-icon">{expandedZonas[zona] ? '▼' : '▶'}</span>
                      <span>{zona}</span>
                      <span style={{ marginLeft: 'auto', fontSize: 11, color: '#64748b', fontWeight: 'normal' }}>
                        {Object.values(resumen[zona]).reduce((s, e) => s + e.total, 0)} contenedores
                      </span>
                    </div>
                    {expandedZonas[zona] && (
                      <div className="tree-sub tree-content open">
                        {Object.keys(resumen[zona]).map(exp => {
                          const expData = resumen[zona][exp];
                          const expKey = `${zona}-${exp}`;
                          return (
                            <div key={exp} className="tree-item" style={{ marginBottom: 8 }}>
                              <div className="tree-header" onClick={() => toggleExportadora(expKey)} style={{ fontSize: 12 }}>
                                <span className="tree-icon" style={{ fontSize: 12 }}>{expandedExportadoras[expKey] ? '▼' : '▶'}</span>
                                <span>{exp}</span>
                                <span style={{ marginLeft: 'auto', fontSize: 10, color: '#64748b', fontWeight: 'normal' }}>
                                  {expData.completo}/{expData.total} ✓
                                </span>
                              </div>
                              {expandedExportadoras[expKey] && (
                                <div className="tree-sub tree-content open">
                                  {expData.items.map(item => (
                                    <div key={item.id} className="stat-box">
                                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
                                        <div>
                                          <div style={{ fontWeight: 600, marginBottom: 4 }}>
                                            <strong>{item.cantidad}</strong> contenedores {item.completado ? '✓ completados' : `✗ ${item.motivo || 'incompletos'}`}
                                          </div>
                                          <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>
                                            Fincas: {item.fincas.join(', ')}
                                          </div>
                                          <div style={{ fontSize: 11, color: '#64748b' }}>
                                            Técnicos: {item.tecnicos.join(', ')}
                                          </div>
                                        </div>
                                        <button className="btn sm danger" onClick={() => eliminarPlanificacion(item.id)}>✕</button>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ))
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>

const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState('agregar');
  const [config, setConfig] = useState(null);
  const [contenedores, setContenedores] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [numero, setNumero] = useState('');
  const [zona, setZona] = useState('');
  const [exportadora, setExportadora] = useState('');
  const [fincas, setFincas] = useState([]);
  const [tecnicos, setTecnicos] = useState([]);
  const [completado, setCompletado] = useState(true);
  const [motivo, setMotivo] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [selectedContainer, setSelectedContainer] = useState(null);
  const [filterZona, setFilterZona] = useState('');

  useEffect(() => {
    Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/contenedores').then(r => r.json())
    ])
    .then(([cfg, cont]) => {
      setConfig(cfg);
      setContenedores(cont.contenedores || []);
      setLoading(false);
    })
    .catch(e => {
      console.error(e);
      setLoading(false);
    });
  }, []);

  const guardar = async (newConts) => {
    setSaving(true);
    try {
      await fetch('/api/contenedores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contenedores: newConts })
      });
    } catch(e) {
      console.error('Error:', e);
    }
    setSaving(false);
  };

  const agregarContenedor = () => {
    if (!numero || !zona || fincas.length === 0 || tecnicos.length === 0) {
      alert('Completa: número, zona, fincas y técnicos');
      return;
    }
    if (tecnicos.length > 2) {
      alert('Máximo 2 técnicos');
      return;
    }
    const newCont = {
      id: Math.random().toString(36).slice(2),
      numero,
      zona,
      exportadora,
      fincas,
      tecnicos,
      completado,
      motivo: completado ? '' : motivo,
      timestamp: new Date().toISOString()
    };
    const newConts = [...contenedores, newCont];
    setContenedores(newConts);
    guardar(newConts);
    setNumero('');
    setZona('');
    setExportadora('');
    setFincas([]);
    setTecnicos([]);
    setCompletado(true);
    setMotivo('');
  };

  const eliminarContenedor = (id) => {
    if (confirm('¿Eliminar?')) {
      const newConts = contenedores.filter(c => c.id !== id);
      setContenedores(newConts);
      guardar(newConts);
    }
  };

  const getExportadoras = () => config && zona ? Object.keys(config.fincas[zona] || {}) : [];
  const getFincasDeExp = () => config && zona && exportadora ? config.fincas[zona]?.[exportadora] || [] : [];
  const toggleFinca = (f) => setFincas(fincas.includes(f) ? fincas.filter(x => x !== f) : [...fincas, f]);
  const toggleTecnico = (t) => {
    if (tecnicos.includes(t)) {
      setTecnicos(tecnicos.filter(x => x !== t));
    } else if (tecnicos.length < 2) {
      setTecnicos([...tecnicos, t]);
    } else {
      alert('Máximo 2 técnicos');
    }
  };
  const contsFiltered = filterZona ? contenedores.filter(c => c.zona === filterZona) : contenedores;

  if (loading) return <div style={{ padding: 24, textAlign: 'center' }}>Cargando...</div>;

  return (
    <div id="app">
      <div className="topbar">
        <div className="topbar-logo">📦 Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'agregar' ? 'active' : ''}`} onClick={() => setTab('agregar')}>➕ Agregar</button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>📊 Resumen</button>
        {saving && <span style={{ fontSize: 11, color: '#f9a825' }}>Guardando...</span>}
      </div>
      <div className="main">
        {tab === 'agregar' && (
          <div className="card">
            <div className="card-title">➕ Nuevo Contenedor</div>
            <div className="form-group">
              <label>Número (ej: 12345 o 12345.5)</label>
              <input type="text" placeholder="12345.5" value={numero} onChange={e => setNumero(e.target.value)}/>
            </div>
            <div className="form-group">
              <label>Zona</label>
              <select value={zona} onChange={e => { setZona(e.target.value); setExportadora(''); setFincas([]); }}>
                <option value="">-- Selecciona zona --</option>
                {config && config.zonas && config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
              </select>
            </div>
            {zona && (
              <div className="form-group">
                <label>Exportadora</label>
                <select value={exportadora} onChange={e => { setExportadora(e.target.value); setFincas([]); }}>
                  <option value="">-- Selecciona exportadora --</option>
                  {getExportadoras().map(e => <option key={e} value={e}>{e}</option>)}
                </select>
              </div>
            )}
            {exportadora && (
              <div className="form-group">
                <label>Fincas ({fincas.length} seleccionadas)</label>
                <div className="checkbox-list">
                  {getFincasDeExp().map(f => (
                    <div key={f} className="checkbox-item">
                      <input type="checkbox" id={f} checked={fincas.includes(f)} onChange={() => toggleFinca(f)}/>
                      <label htmlFor={f}>{f}</label>
                    </div>
                  ))}
                </div>
                {fincas.length > 0 && <div style={{ marginTop: 8 }}>
                  {fincas.map(f => <span key={f} className="chip">{f}</span>)}
                </div>}
              </div>
            )}
            <div className="form-group">
              <label>Técnicos ({tecnicos.length}/2)</label>
              <select onChange={e => { if (e.target.value) toggleTecnico(e.target.value); e.target.value = ''; }}>
                <option value="">Buscar y agregar técnico...</option>
                {config && config.tecnicos && config.tecnicos.filter(t => !tecnicos.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              {tecnicos.length > 0 && <div style={{ marginTop: 8 }}>
                {tecnicos.map(t => (<span key={t} className="chip remove" onClick={() => setTecnicos(tecnicos.filter(x => x !== t))}>{t} ✕</span>))}
              </div>}
            </div>
            <div className="form-group">
              <label>Estado</label>
              <select value={completado ? 'completo' : 'incompleto'} onChange={e => setCompletado(e.target.value === 'completo')}>
                <option value="completo">✓ Completado</option>
                <option value="incompleto">✗ Incompleto</option>
              </select>
            </div>
            {!completado && (
              <div className="form-group">
                <label>Razón de no completación</label>
                <textarea placeholder="Ej: Falta de técnicos, clima..." value={motivo} onChange={e => setMotivo(e.target.value)} style={{ minHeight: 60 }}/>
              </div>
            )}
            <button className="btn amber" onClick={agregarContenedor} style={{ width: '100%', padding: '10px', fontSize: '13px' }}>✓ AGREGAR CONTENEDOR</button>
          </div>
        )}
        {tab === 'resumen' && (
          <div>
            <div className="stat-grid">
              <div className="stat"><div className="stat-val">{contenedores.length}</div><div className="stat-label">Total</div></div>
              <div className="stat"><div className="stat-val">{contenedores.filter(c => c.completado).length}</div><div className="stat-label">Completos</div></div>
              <div className="stat"><div className="stat-val">{contenedores.filter(c => !c.completado).length}</div><div className="stat-label">Incompletos</div></div>
            </div>
            <div className="card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                <div className="card-title">Contenedores</div>
                {config && config.zonas && (
                  <select value={filterZona} onChange={e => setFilterZona(e.target.value)} style={{ maxWidth: '220px', padding: '7px 10px', border: '1px solid #cbd5e1', borderRadius: '6px', background: '#fff', color: '#334155', fontSize: '13px', cursor: 'pointer' }}>
                    <option value="">Todas las zonas</option>
                    {config.zonas.map(z => <option key={z} value={z}>{z}</option>)}
                  </select>
                )}
              </div>
              {contsFiltered.length === 0 ? (
                <div style={{ textAlign: 'center', color: '#64748b', padding: 20 }}>Sin contenedores</div>
              ) : (
                contsFiltered.map(c => (
                  <div key={c.id} className="item-compact">
                    <div className="item-info">
                      <div className="item-header">#{c.numero} • {c.zona} • {c.exportadora}</div>
                      <div className="item-meta">{c.fincas.length} fincas • {c.tecnicos.map(t => <span key={t} className="chip" style={{ marginRight: 2 }}>{t.split(' ')[0]}</span>)} • <span className={`tag ${c.completado ? 'tag-ok' : 'tag-bad'}`}>{c.completado ? '✓ OK' : `✗ ${c.motivo}`}</span></div>
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button className="btn sm" onClick={() => { setSelectedContainer(c); setShowModal(true); }}>Detalles</button>
                      <button className="btn sm danger" onClick={() => eliminarContenedor(c.id)}>✕</button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        )}
      </div>
      <div className={`modal-overlay ${showModal ? 'open' : ''}`} onClick={() => setShowModal(false)}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          {selectedContainer && (
            <div>
              <h2>Contenedor #{selectedContainer.numero}</h2>
              <div style={{ marginTop: 16, fontSize: 13 }}>
                <div style={{ marginBottom: 12 }}><strong>Zona:</strong> {selectedContainer.zona}</div>
                <div style={{ marginBottom: 12 }}><strong>Exportadora:</strong> {selectedContainer.exportadora}</div>
                <div style={{ marginBottom: 12 }}><strong>Fincas ({selectedContainer.fincas.length}):</strong><div>{selectedContainer.fincas.map(f => <span key={f} className="chip">{f}</span>)}</div></div>
                <div style={{ marginBottom: 12 }}><strong>Técnicos ({selectedContainer.tecnicos.length}):</strong><div>{selectedContainer.tecnicos.map(t => <span key={t} className="chip">{t}</span>)}</div></div>
                <div style={{ marginBottom: 12 }}><strong>Estado:</strong> <span className={`tag ${selectedContainer.completado ? 'tag-ok' : 'tag-bad'}`}>{selectedContainer.completado ? '✓ Completado' : '✗ Incompleto'}</span></div>
                {!selectedContainer.completado && <div><strong>Razón:</strong> {selectedContainer.motivo}</div>}
                <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 16 }}>{new Date(selectedContainer.timestamp).toLocaleString('es-ES')}</div>
              </div>
            </div>
          )}
          <button className="btn primary" onClick={() => setShowModal(false)} style={{ marginTop: 20, width: '100%' }}>Cerrar</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>

sName="card-title">Contenedores</div>{config&&config.zonas&&<select value={filterZona} onChange={e=>setFilterZona(e.target.value)} style={{maxWidth:"220px",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:"6px",background:"#fff",color:"#334155",fontSize:"13px",cursor:"pointer"}}><option value="">Todas las zonas</option>{config.zonas.map(z=><option key={z} value={z}>{z}</option>)}</select>}</div>{contsFiltered.length===0?<div style={{textAlign:"center",color:"#64748b",padding:20}}>Sin contenedores</div>:contsFiltered.map(c=><div key={c.id} className="item-compact"><div className="item-info"><div className="item-header">#{c.numero} • {c.zona} • {c.exportadora}</div><div className="item-meta">{c.fincas.length} fincas • {c.tecnicos.map(t=><span key={t} className="chip" style={{marginRight:2}}>{t.split(" ")[0]}</span>)} • <span className={`tag ${c.completado?"tag-ok":"tag-bad"}`}>{c.completado?"✓ OK":`✗ ${c.motivo}`}</span></div></div><div style={{display:"flex",gap:8}}><button className="btn sm" onClick={()=>{setSelectedContainer(c);setShowModal(true)}}>Detalles</button><button className="btn sm danger" onClick={()=>eliminarContenedor(c.id)}>✕</button></div></div>))}</div></div>}</div></div><div className={`modal-overlay ${showModal?"open":""}`} onClick={()=>setShowModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>{selectedContainer&&<div><h2>Contenedor #{selectedContainer.numero}</h2><div style={{marginTop:16,fontSize:13}}><div style={{marginBottom:12}}><strong>Zona:</strong> {selectedContainer.zona}</div><div style={{marginBottom:12}}><strong>Exportadora:</strong> {selectedContainer.exportadora}</div><div style={{marginBottom:12}}><strong>Fincas ({selectedContainer.fincas.length}):</strong><div>{selectedContainer.fincas.map(f=><span key={f} className="chip">{f}</span>)}</div></div><div style={{marginBottom:12}}><strong>Técnicos ({selectedContainer.tecnicos.length}):</strong><div>{selectedContainer.tecnicos.map(t=><span key={t} className="chip">{t}</span>)}</div></div><div style={{marginBottom:12}}><strong>Estado:</strong> <span className={`tag ${selectedContainer.completado?"tag-ok":"tag-bad"}`}>{selectedContainer.completado?"✓ Completado":"✗ Incompleto"}</span></div>{!selectedContainer.completado&&<div><strong>Razón:</strong> {selectedContainer.motivo}</div>}<div style={{fontSize:11,color:"#94a3b8",marginTop:16}}>{new Date(selectedContainer.timestamp).toLocaleString("es-ES")}</div></div></div>}<button className="btn primary" onClick={()=>setShowModal(false)} style={{marginTop:20,width:"100%"}}>Cerrar</button></div></div></div>}ReactDOM.render(<App/>,document.getElementById("app"));
</script>
