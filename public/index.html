<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificación de Contenedores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: #f5f7fa; color: #1a1a2e; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: #0f2040; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .topbar-logo { font-size: 15px; font-weight: 700; margin-right: auto; }
    .topbar-logo span { color: #f9a825; }
    .nav-tab { background: transparent; border: none; color: rgba(255,255,255,.6); padding: 0 16px; height: 56px; cursor: pointer; font-size: 13px; border-bottom: 3px solid transparent; transition: .15s; font-weight: 500; }
    .nav-tab:hover { color: #fff; }
    .nav-tab.active { color: #fff; border-bottom-color: #f9a825; }
    .main { flex: 1; padding: 20px 24px; max-width: 1300px; width: 100%; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #0f2040; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: .12s; }
    .btn:hover { background: #f1f5f9; border-color: #94a3b8; }
    .btn.primary { background: #0f2040; color: #fff; border: none; }
    .btn.primary:hover { background: #1a3560; }
    .btn.amber { background: #f9a825; color: #1a1a2e; border: none; font-weight: 600; }
    .btn.amber:hover { background: #e09720; }
    .btn.sm { padding: 4px 9px; font-size: 11px; }
    .btn.danger { color: #dc2626; border-color: #fca5a5; }
    .btn.danger:hover { background: #fee2e2; }
    select, input[type="week"] { padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; font-size: 13px; cursor: pointer; min-width: 200px; }
    input[type="text"], input[type="number"] { padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a2e; width: 100%; max-width: 300px; }
    input:focus { outline: none; border-color: #0f2040; box-shadow: 0 0 0 3px rgba(15,32,64,.08); }
    textarea { width: 100%; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a2e; font-family: inherit; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-val { font-size: 24px; font-weight: 700; color: #0f2040; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 4px; }
    .chip { display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 4px 8px; font-size: 10px; color: #1e40af; font-weight: 500; margin-right: 4px; margin-bottom: 4px; }
    .chip.remove { cursor: pointer; }
    .chip.remove:hover { background: #dbeafe; }
    .checkbox-list { max-height: 150px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 4px; cursor: pointer; }
    .checkbox-item:hover { background: #f8fafc; border-radius: 4px; }
    .checkbox-item input { cursor: pointer; }
    .checkbox-item label { cursor: pointer; flex: 1; margin: 0; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    table thead { background: #f8fafc; }
    table th, table td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
    table th { font-weight: 600; color: #0f2040; }
    .stat-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 12px; }
  </style>
</head>
<body>
<div id="app"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState('agregar');
  const [config, setConfig] = useState(null);
  const [planificaciones, setPlanificaciones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [expandedRows, setExpandedRows] = useState({});
  const [formSemana, setFormSemana] = useState('');
  const [formZona, setFormZona] = useState('');
  const [formExportadora, setFormExportadora] = useState('');
  const [formCantidad, setFormCantidad] = useState('');
  const [formFincas, setFormFincas] = useState([]);
  const [formTecnicos, setFormTecnicos] = useState([]);
  const [formCompletado, setFormCompletado] = useState(true);
  const [formMotivo, setFormMotivo] = useState('');
  const [filterSemana, setFilterSemana] = useState('');

  useEffect(() => {
    Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/contenedores').then(r => r.json())
    ])
    .then(([cfg, cont]) => {
      setConfig(cfg);
      setPlanificaciones(cont.contenedores || []);
      setLoading(false);
    })
    .catch(e => { console.error(e); setLoading(false); });
  }, []);

  const guardar = async (newPlans) => {
    setSaving(true);
    try {
      await fetch('/api/contenedores', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contenedores: newPlans }) });
    } catch(e) { console.error('Error:', e); }
    setSaving(false);
  };

  const agregarPlanificacion = () => {
    if (!formSemana || !formCantidad || !formZona || !formExportadora || formFincas.length === 0 || formTecnicos.length === 0) {
      alert('Completa todos los campos');
      return;
    }
    const newPlan = {
      id: Math.random().toString(36).slice(2),
      semana: formSemana, zona: formZona, exportadora: formExportadora, cantidad: parseFloat(formCantidad),
      fincas: formFincas, tecnicos: formTecnicos, completado: formCompletado, motivo: formCompletado ? '' : formMotivo,
      timestamp: new Date().toISOString()
    };
    const newPlans = [...planificaciones, newPlan];
    setPlanificaciones(newPlans);
    guardar(newPlans);
    setFormSemana(''); setFormZona(''); setFormExportadora(''); setFormCantidad('');
    setFormFincas([]); setFormTecnicos([]); setFormCompletado(true); setFormMotivo('');
  };

  const eliminarPlanificacion = (id) => {
    if (confirm('¿Eliminar?')) {
      const newPlans = planificaciones.filter(p => p.id !== id);
      setPlanificaciones(newPlans);
      guardar(newPlans);
    }
  };

  const getExportadoras = () => config && formZona ? Object.keys(config.fincas[formZona] || {}) : [];
  const getFincasDeExp = () => config && formZona && formExportadora ? config.fincas[formZona]?.[formExportadora] || [] : [];
  const toggleFinca = (f) => setFormFincas(formFincas.includes(f) ? formFincas.filter(x => x !== f) : [...formFincas, f]);
  const toggleTecnico = (t) => {
    if (formTecnicos.includes(t)) setFormTecnicos(formTecnicos.filter(x => x !== t));
    else if (formTecnicos.length < 2) setFormTecnicos([...formTecnicos, t]);
    else alert('Máximo 2 técnicos');
  };
  const getUniqueSemanas = () => [...new Set(planificaciones.map(p => p.semana))].sort((a, b) => b.localeCompare(a));
  const planificacionesPorSemana = () => !filterSemana ? planificaciones : planificaciones.filter(p => p.semana === filterSemana);
  const resumenPorZonaExportadora = () => {
    const grouped = {};
    planificacionesPorSemana().forEach(p => {
      const key = `${p.zona}|${p.exportadora}`;
      if (!grouped[key]) grouped[key] = { zona: p.zona, exportadora: p.exportadora, cantidad: 0, items: [] };
      grouped[key].cantidad += p.cantidad;
      grouped[key].items.push(p);
    });
    return Object.values(grouped);
  };

  if (loading) return <div style={{ padding: 24, textAlign: 'center' }}>Cargando...</div>;

  return (
    <div id="app">
      <div className="topbar">
        <div className="topbar-logo">📦 Planificación <span>Banano</span></div>
        <button className={`nav-tab ${tab === 'agregar' ? 'active' : ''}`} onClick={() => setTab('agregar')}>➕ Agregar</button>
        <button className={`nav-tab ${tab === 'resumen' ? 'active' : ''}`} onClick={() => setTab('resumen')}>📊 Resumen</button>
        {saving && <span style={{ fontSize: 11, color: '#f9a825' }}>Guardando...</span>}
      </div>
      <div className="main">
        {tab === 'agregar' && (
          <div className="card">
            <div className="card-title">➕ Nueva Planificación</div>
            <div className="form-row">
              <div className="form-group"><label>Semana</label><input type="week" value={formSemana} onChange={e => setFormSemana(e.target.value)} /></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Zona</label><select value={formZona} onChange={e => { setFormZona(e.target.value); setFormExportadora(''); setFormFincas([]); }}><option value="">-- Selecciona zona --</option>{config && config.zonas && config.zonas.map(z => <option key={z} value={z}>{z}</option>)}</select></div>
              {formZona && (<div className="form-group"><label>Exportadora</label><select value={formExportadora} onChange={e => { setFormExportadora(e.target.value); setFormFincas([]); }}><option value="">-- Selecciona --</option>{getExportadoras().map(e => <option key={e} value={e}>{e}</option>)}</select></div>)}
              <div className="form-group"><label>Cantidad</label><input type="number" step="0.5" placeholder="100.5" value={formCantidad} onChange={e => setFormCantidad(e.target.value)} /></div>
            </div>
            {formExportadora && (
              <div className="form-group"><label>Fincas ({formFincas.length})</label><div className="checkbox-list">{getFincasDeExp().map(f => (<div key={f} className="checkbox-item"><input type="checkbox" id={f} checked={formFincas.includes(f)} onChange={() => toggleFinca(f)} /><label htmlFor={f}>{f}</label></div>))}</div>{formFincas.length > 0 && <div style={{ marginTop: 8 }}>{formFincas.map(f => <span key={f} className="chip">{f}</span>)}</div>}</div>
            )}
            <div className="form-group"><label>Técnicos ({formTecnicos.length}/2)</label><select onChange={e => { if (e.target.value) toggleTecnico(e.target.value); e.target.value = ''; }}><option value="">Agregar técnico...</option>{config && config.tecnicos && config.tecnicos.filter(t => !formTecnicos.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}</select>{formTecnicos.length > 0 && <div style={{ marginTop: 8 }}>{formTecnicos.map(t => <span key={t} className="chip remove" onClick={() => setFormTecnicos(formTecnicos.filter(x => x !== t))}>{t} ✕</span>)}</div>}</div>
            <div className="form-row"><div className="form-group"><label>Estado</label><select value={formCompletado ? 'completo' : 'incompleto'} onChange={e => setFormCompletado(e.target.value === 'completo')}><option value="completo">✓ Completado</option><option value="incompleto">✗ Incompleto</option></select></div></div>
            {!formCompletado && <div className="form-group"><label>Razón</label><textarea placeholder="Detalle..." value={formMotivo} onChange={e => setFormMotivo(e.target.value)} style={{ minHeight: 60 }} /></div>}
            <button className="btn amber" onClick={agregarPlanificacion} style={{ width: '100%', padding: '10px' }}>✓ AGREGAR</button>
          </div>
        )}
        {tab === 'resumen' && (
          <div>
            <div className="stat-grid">
              <div className="stat"><div className="stat-val">{planificacionesPorSemana().length}</div><div className="stat-label">Total</div></div>
              <div className="stat"><div className="stat-val">{planificacionesPorSemana().filter(p => p.completado).length}</div><div className="stat-label">Completos</div></div>
              <div className="stat"><div className="stat-val">{planificacionesPorSemana().filter(p => !p.completado).length}</div><div className="stat-label">Incompletos</div></div>
              <div className="stat"><div className="stat-val">{planificacionesPorSemana().reduce((s, p) => s + p.cantidad, 0).toFixed(1)}</div><div className="stat-label">Qty Total</div></div>
            </div>
            <div className="card">
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14, gap: 12 }}><div className="card-title">Planificaciones</div><select value={filterSemana} onChange={e => setFilterSemana(e.target.value)} style={{ maxWidth: '220px' }}><option value="">Todas</option>{getUniqueSemanas().map(s => <option key={s} value={s}>{s}</option>)}</select></div>
              {planificacionesPorSemana().length === 0 ? <div style={{ textAlign: 'center', color: '#64748b', padding: 20 }}>Sin planificaciones</div> : (
                <table><thead><tr><th>Zona</th><th>Exportadora</th><th>Cantidad</th><th></th></tr></thead><tbody>{resumenPorZonaExportadora().map(grupo => (
                  <tr key={`${grupo.zona}|${grupo.exportadora}`}><td>{grupo.zona}</td><td>{grupo.exportadora}</td><td>{grupo.cantidad.toFixed(1)}</td><td><button className="btn sm" onClick={() => { const key = `${grupo.zona}|${grupo.exportadora}`; setExpandedRows({ ...expandedRows, [key]: !expandedRows[key] }); }}>{expandedRows[`${grupo.zona}|${grupo.exportadora}`] ? '▼' : '▶'}</button></td></tr>
                ))}</tbody></table>
              )}
              {resumenPorZonaExportadora().map(grupo => (expandedRows[`${grupo.zona}|${grupo.exportadora}`] && (
                <div key={`d-${grupo.zona}|${grupo.exportadora}`} style={{ marginTop: 20, paddingTop: 20, borderTop: '1px solid #e2e8f0' }}>
                  <div className="card-title">Detalles: {grupo.zona} → {grupo.exportadora}</div>
                  {grupo.items.map(item => (<div key={item.id} className="stat-box"><div style={{ display: 'flex', justifyContent: 'space-between' }}><div><div style={{ fontWeight: 600, marginBottom: 4 }}>Cantidad: {item.cantidad}</div><div style={{ color: '#64748b', fontSize: 11 }}>Fincas: {item.fincas.join(', ')}</div><div style={{ color: '#64748b', fontSize: 11 }}>Técnicos: {item.tecnicos.join(', ')}</div><div style={{ color: '#64748b', fontSize: 11 }}>Estado: <span className={`tag ${item.completado ? 'tag-ok' : 'tag-bad'}`}>{item.completado ? '✓ OK' : '✗'}</span></div></div><button className="btn sm danger" onClick={() => eliminarPlanificacion(item.id)}>✕</button></div></div>))}
                </div>
              )))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
